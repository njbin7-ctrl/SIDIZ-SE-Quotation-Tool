<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDIZ SE Quotation Tool</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; height: 100vh; overflow: hidden; background-color: #f9fafb; }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // SE님이 사용하시는 구글 시트 주소입니다.
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1af5u1NNvYs_ygLw3CnfWiZrp_IkvLcmUs1edO52p1kU/gviz/tq?tqx=out:csv&gid=1647057314";

        function App() {
            const [products, setProducts] = useState([]);
            const [promotions, setPromotions] = useState([]);
            const [naverLive, setNaverLive] = useState("");
            const [cart, setCart] = useState([]);
            const [selectedPromo, setSelectedPromo] = useState("none");
            const [savedQuotes, setSavedQuotes] = useState([]);
            const [searchTerm, setSearchTerm] = useState("");
            const [category, setCategory] = useState("전체");

            // 구글 시트에서 실시간 데이터를 가져오는 함수
            useEffect(() => {
                fetch(SHEET_URL)
                    .then(res => res.text())
                    .then(data => {
                        const rows = data.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '')));
                        
                        // 네이버 라방 일정 (B5)
                        setNaverLive(rows[4] ? rows[4][1] : "일정 확인 중");

                        // 프로모션 안내 (10-12행)
                        const promoData = [];
                        if(rows[8]) {
                            for(let i=1; i<=4; i++) {
                                if(rows[8][i]) promoData.push({ title: rows[8][i], content: rows[10][i] });
                            }
                        }
                        setPromotions(promoData);

                        // 제품 데이터 (30행부터)
                        const productData = rows.slice(29).filter(r => r[2]).map(r => ({
                            series: r[0],
                            cat: r[1],
                            name: r[2],
                            code: r[3],
                            priceMsrp: parseInt(r[4]) || 0,
                            priceOnline: parseInt(r[5]) || 0
                        }));
                        setProducts(productData);
                    });
            }, []);

            // 가격 및 할인율 실시간 계산
            const totals = useMemo(() => {
                const baseOnlineTotal = cart.reduce((sum, item) => sum + (item.priceOnline * item.count), 0);
                const baseMsrpTotal = cart.reduce((sum, item) => sum + (item.priceMsrp * item.count), 0);
                
                let finalPrice = baseOnlineTotal;
                if (selectedPromo === "5000") finalPrice -= 5000;
                else if (selectedPromo.includes("%")) {
                    const rate = parseInt(selectedPromo) / 100;
                    finalPrice = baseOnlineTotal * (1 - rate);
                }

                const discountFromMsrp = baseMsrpTotal > 0 ? ((1 - finalPrice / baseMsrpTotal) * 100).toFixed(1) : 0;
                const discountFromOnline = baseOnlineTotal > 0 ? ((1 - finalPrice / baseOnlineTotal) * 100).toFixed(1) : 0;

                return { finalPrice, baseMsrpTotal, baseOnlineTotal, discountFromMsrp, discountFromOnline };
            }, [cart, selectedPromo]);

            const addToCart = (p) => {
                const existing = cart.find(item => item.code === p.code);
                if (existing) {
                    setCart(cart.map(item => item.code === p.code ? {...item, count: item.count + 1} : item));
                } else {
                    setCart([...cart, {...p, count: 1}]);
                }
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    {/* 섹션 1: 상단 프로모션 고정 영역 */}
                    <div className="bg-white border-b p-4 flex-shrink-0 z-10 shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-2xl font-black text-slate-800">SIDIZ <span className="text-blue-600">SE</span></h1>
                            <div className="bg-emerald-500 text-white px-4 py-1 rounded-full text-xs font-bold">
                                🟢 NAVER LIVE : {naverLive}
                            </div>
                        </div>
                        <div className="flex gap-3 overflow-x-auto pb-1 scroll-hide">
                            {promotions.map((p, i) => (
                                <div key={i} className="min-w-[200px] bg-slate-50 p-3 rounded-xl border border-slate-100 flex-shrink-0">
                                    <div className="font-bold text-blue-700 text-xs mb-1">{p.title}</div>
                                    <div className="text-[11px] text-slate-500 leading-tight">{p.content}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        {/* 섹션 2: 좌측 제품 탐색 영역 */}
                        <div className="flex-1 flex flex-col p-4 overflow-hidden">
                            <input 
                                type="text" 
                                placeholder="제품명 또는 단품코드를 검색하세요" 
                                className="w-full p-4 border-2 border-slate-100 rounded-2xl mb-4 focus:border-blue-500 outline-none transition-all shadow-inner bg-white"
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                            <div className="flex gap-2 mb-4 overflow-x-auto scroll-hide">
                                {["전체", "게이밍", "워크", "스터디", "리빙"].map(cat => (
                                    <button 
                                        key={cat}
                                        onClick={() => setCategory(cat)}
                                        className={`px-5 py-2 rounded-full text-xs font-bold transition-all ${category === cat ? 'bg-slate-800 text-white' : 'bg-white border text-slate-400'}`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 overflow-y-auto pr-2 pb-10">
                                {products
                                    .filter(p => (category === "전체" || p.series.includes(category) || p.cat.includes(category)))
                                    .filter(p => p.name.includes(searchTerm) || p.code.includes(searchTerm))
                                    .map((p, i) => (
                                    <div key={i} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md hover:border-blue-400 transition-all cursor-pointer group" onClick={() => addToCart(p)}>
                                        <div className="text-[10px] text-slate-300 font-bold mb-1 uppercase tracking-wider">{p.cat}</div>
                                        <div className="font-bold text-slate-700 text-sm mb-3 truncate group-hover:text-blue-600">{p.name}</div>
                                        <div className="text-[11px] text-slate-300 mb-1">소비자가 {p.priceMsrp.toLocaleString()}</div>
                                        <div className="font-extrabold text-slate-800">온라인 {p.priceOnline.toLocaleString()}원</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 섹션 3: 우측 견적 대시보드 (위아래로 긴 패널) */}
                        <div className="w-80 bg-slate-50 border-l border-slate-200 flex flex-col shadow-2xl z-20">
                            <div className="p-5 border-b bg-white flex justify-between items-center">
                                <h2 className="font-black text-slate-800">🛒 견적함</h2>
                                <span className="bg-blue-100 text-blue-600 text-[10px] px-2 py-0.5 rounded-full font-bold">{cart.length} ITEMS</span>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                {cart.map(item => (
                                    <div key={item.code} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 relative group">
                                        <button onClick={() => setCart(cart.filter(c => c.code !== item.code))} className="absolute top-2 right-2 text-slate-200 hover:text-red-400">✕</button>
                                        <div className="font-bold text-slate-700 text-xs mb-2 pr-4">{item.name}</div>
                                        <div className="flex justify-between items-center">
                                            <span className="text-xs font-bold text-slate-400">{item.priceOnline.toLocaleString()}원</span>
                                            <div className="flex items-center bg-slate-100 rounded-lg px-2">
                                                <button onClick={() => {
                                                    if(item.count > 1) setCart(cart.map(c => c.code === item.code ? {...c, count: c.count - 1} : c));
                                                }} className="p-1 text-slate-400">-</button>
                                                <span className="px-3 text-xs font-bold">{item.count}</span>
                                                <button onClick={() => addToCart(item)} className="p-1 text-slate-400">+</button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {cart.length === 0 && (
                                    <div className="h-full flex flex-col items-center justify-center opacity-20 mt-20">
                                        <span className="text-4xl mb-2">🪑</span>
                                        <p className="text-xs font-bold">제품을 담아주세요</p>
                                    </div>
                                )}
                            </div>

                            <div className="p-5 bg-white border-t border-slate-200 space-y-4">
                                <div className="space-y-1">
                                    <p className="text-[10px] font-bold text-slate-400 ml-1">최종 혜택 선택</p>
                                    <select 
                                        className="w-full p-3 bg-slate-50 border-none rounded-xl text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500"
                                        value={selectedPromo}
                                        onChange={(e) => setSelectedPromo(e.target.value)}
                                    >
                                        <option value="none">적용할 혜택을 선택하세요</option>
                                        <option value="5000">신규 회원 할인 (-5,000원)</option>
                                        <option value="3%">단품 구매 할인 (3%)</option>
                                        <option value="5%">세트/2개 이상 할인 (5%)</option>
                                        <option value="7%">쿠폰 3단계 할인 (7%)</option>
                                        <option value="10%">쿠폰 4단계 할인 (10%)</option>
                                        <option value="15%">쿠폰 6단계 할인 (15%)</option>
                                    </select>
                                </div>

                                <div className="pt-2 space-y-1 text-right border-t border-dashed">
                                    <div className="text-[10px] text-slate-300">정상가 {totals.baseMsrpTotal.toLocaleString()}원</div>
                                    <div className="text-2xl font-black text-blue-600 tracking-tighter">
                                        {totals.finalPrice.toLocaleString()}원
                                    </div>
                                    <div className="flex justify-end gap-2 text-[10px] font-black uppercase">
                                        <span className="text-purple-400">정상가 대비 {totals.discountFromMsrp}% 할인</span>
                                        <span className="text-emerald-400">온라인 대비 {totals.discountFromOnline}% 추가혜택</span>
                                    </div>
                                </div>

                                <div className="flex gap-2 pt-2">
                                    <button onClick={() => {
                                        if(cart.length > 0) {
                                            const newQuote = { id: Date.now(), cart: [...cart], promo: selectedPromo, total: totals.finalPrice };
                                            setSavedQuotes([newQuote, ...savedQuotes].slice(0, 3));
                                        }
                                    }} className="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl text-xs font-bold hover:bg-slate-200 transition-all">기억하기</button>
                                    <button onClick={() => window.print()} className="flex-[2] py-3 bg-blue-600 text-white rounded-xl text-xs font-black shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">견적서 저장</button>
                                </div>
                                
                                <div className="flex gap-1 overflow-x-auto scroll-hide">
                                    {savedQuotes.map((q, i) => (
                                        <button key={q.id} onClick={() => { if(confirm("이전 견적을 불러올까요?")) { setCart(q.cart); setSelectedPromo(q.promo); } }} className="flex-shrink-0 bg-blue-50 text-[9px] px-2 py-1 rounded-md border border-blue-100 font-bold text-blue-400">
                                            #{savedQuotes.length-i} ({q.total.toLocaleString()})
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
