<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDIZ SE Quotation Tool</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; height: 100vh; overflow: hidden; background-color: #f8fafc; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .sidebar-shadow { box-shadow: -10px 0 30px rgba(0,0,0,0.05); }
        .product-card:hover { transform: translateY(-4px); border-color: #3b82f6; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 구글 시트 연결 정보
        const SHEET_ID = "1af5u1NNvYs_ygLw3CnfWiZrp_IkvLcmUs1edO52p1kU";
        const GID = "1647057314";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        function App() {
            const [data, setData] = useState({ products: [], events: [], naverLive: "", coupons: [] });
            const [cart, setCart] = useState([]);
            const [selectedPromo, setSelectedPromo] = useState("혜택을 선택하세요");
            const [search, setSearch] = useState("");
            const [category, setCategory] = useState("전체");
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            
            // 저장된 견적 (브라우저 기억)
            const [savedQuotes, setSavedQuotes] = useState(() => {
                try {
                    const saved = localStorage.getItem('sidiz_saved_v1');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });

            // 데이터 불러오기
            useEffect(() => {
                const loadData = async () => {
                    try {
                        const res = await fetch(CSV_URL);
                        if (!res.ok) throw new Error("시트 공유 설정을 확인해주세요.");
                        const text = await res.text();
                        
                        // 단순 쉼표 분리 (데이터 정제)
                        const rows = text.split('\n').map(row => 
                            row.split(',').map(cell => cell.replace(/^"|"$/g, '').trim())
                        );

                        const naverLive = rows[4]?.[1] || "일정 확인 중";
                        const events = [
                            { name: rows[9]?.[1], desc: rows[11]?.[1] },
                            { name: rows[9]?.[2], desc: rows[11]?.[2] },
                            { name: rows[9]?.[3], desc: rows[11]?.[3] },
                            { name: rows[9]?.[4], desc: rows[11]?.[4] }
                        ].filter(e => e.name && e.name !== "undefined");

                        const products = rows.slice(29).filter(r => r[2] && r[2] !== "제품명").map(r => ({
                            series: r[0] || "기타",
                            sub: r[1] || "",
                            name: r[2],
                            code: r[3],
                            retail: parseInt(r[4]?.replace(/[^0-9]/g, '')) || 0,
                            online: parseInt(r[5]?.replace(/[^0-9]/g, '')) || 0
                        }));

                        setData({ products, events, naverLive });
                        setError(null);
                    } catch (err) {
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                };
                loadData();
            }, []);

            // 실시간 계산기
            const calc = useMemo(() => {
                const retailSum = cart.reduce((acc, cur) => acc + (cur.retail * cur.count), 0);
                const onlineSum = cart.reduce((acc, cur) => acc + (cur.online * cur.count), 0);
                let final = onlineSum;

                if (selectedPromo === "신규 회원 할인 (-5,000원)") final -= 5000;
                else if (selectedPromo.includes("%")) {
                    const rate = parseInt(selectedPromo.match(/\d+/)) / 100;
                    final = onlineSum * (1 - rate);
                }

                return {
                    retailSum, onlineSum, final,
                    offRetail: retailSum > 0 ? ((1 - final / retailSum) * 100).toFixed(1) : 0,
                    offOnline: onlineSum > 0 ? ((1 - final / onlineSum) * 100).toFixed(1) : 0
                };
            }, [cart, selectedPromo]);

            // 기능 함수들
            const addToCart = (p) => {
                setCart(prev => {
                    const exists = prev.find(i => i.code === p.code);
                    if (exists) return prev.map(i => i.code === p.code ? {...i, count: i.count + 1} : i);
                    return [...prev, {...p, count: 1}];
                });
            };

            const handleSave = () => {
                if (cart.length === 0) return;
                const newQuote = { id: Date.now(), cart: [...cart], promo: selectedPromo, total: calc.final };
                const updated = [newQuote, ...savedQuotes].slice(0, 3);
                setSavedQuotes(updated);
                localStorage.setItem('sidiz_saved_v1', JSON.stringify(updated));
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-blue-600">SIDIZ SE 데이터를 연결 중입니다...</div>;
            if (error) return <div className="h-screen flex flex-col items-center justify-center p-10"><p className="text-red-500 font-bold mb-2">데이터 연결 오류</p><p className="text-sm text-gray-500">{error}</p></div>;

            return (
                <div className="flex h-screen w-screen bg-white">
                    {/* [좌측 영역] */}
                    <div className="flex-1 flex flex-col min-w-0">
                        {/* 섹션 1: 상단 헤더 */}
                        <header className="p-6 border-b border-gray-100 flex-shrink-0">
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-2xl font-black text-slate-800 tracking-tighter">SIDIZ <span className="text-blue-600 font-black">SE</span></h1>
                                <div className="bg-[#03C75A] text-white px-4 py-1.5 rounded-full text-sm font-black shadow-sm">
                                    LIVE: {data.naverLive}
                                </div>
                            </div>
                            <div className="flex gap-3 overflow-x-auto no-scrollbar">
                                {data.events.map((e, i) => (
                                    <div key={i} className="min-w-[240px] bg-blue-50/50 border border-blue-100 p-4 rounded-2xl">
                                        <div className="text-[12px] font-black text-blue-700 mb-1">{e.name}</div>
                                        <div className="text-[10px] text-slate-500 leading-tight">{e.desc}</div>
                                    </div>
                                ))}
                            </div>
                        </header>

                        {/* 섹션 2: 제품 목록 */}
                        <main className="flex-1 flex flex-col p-6 overflow-hidden bg-slate-50/30">
                            <input 
                                type="text" placeholder="제품명 또는 단품코드를 검색하세요" 
                                className="w-full p-4 bg-white border border-gray-200 rounded-2xl mb-6 text-base shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                onChange={e => setSearch(e.target.value)}
                            />
                            <div className="flex gap-2 mb-6 overflow-x-auto no-scrollbar">
                                {["전체", "게이밍", "워크", "스터디", "리빙"].map(c => (
                                    <button key={c} onClick={() => setCategory(c)} className={`px-6 py-2 rounded-xl text-sm font-bold transition-all whitespace-nowrap ${category === c ? 'bg-slate-800 text-white shadow-lg' : 'bg-white border text-slate-400'}`}>{c}</button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4 overflow-y-auto pr-2 pb-20 no-scrollbar">
                                {data.products.filter(p => (category === "전체" || p.series.includes(category)) && (p.name.includes(search) || p.code.includes(search))).map((p, i) => (
                                    <div key={i} onClick={() => addToCart(p)} className="product-card bg-white p-5 rounded-3xl border border-gray-100 shadow-sm cursor-pointer transition-all flex flex-col h-full">
                                        <div className="text-[10px] font-black text-blue-400 uppercase mb-1">{p.series}</div>
                                        <div className="text-sm font-bold text-slate-800 mb-4 line-clamp-2 h-10 leading-snug">{p.name}</div>
                                        <div className="mt-auto border-t pt-4 flex justify-between items-end">
                                            <div>
                                                <div className="text-[10px] text-slate-300 line-through mb-1">{p.retail.toLocaleString()}원</div>
                                                <div className="text-base font-black text-slate-900 leading-none">{p.online.toLocaleString()}원</div>
                                            </div>
                                            <div className="w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-bold">+</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>

                    {/* [우측 영역] 섹션 3: 견적 대시보드 */}
                    <aside className="w-[360px] sidebar-shadow bg-white z-20 flex flex-col h-full">
                        <div className="p-6 border-b flex justify-between items-center h-[88px]">
                            <h2 className="font-black text-slate-800 text-lg flex items-center gap-2">🛒 견적 대시보드 <span className="text-xs bg-blue-600 text-white px-2 py-0.5 rounded-full">{cart.length}</span></h2>
                            <button onClick={() => setCart([])} className="text-[10px] font-bold text-slate-300 hover:text-red-400 uppercase">Clear</button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-5 space-y-4 no-scrollbar bg-slate-50/50">
                            {cart.map(item => (
                                <div key={item.code} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col gap-3 relative">
                                    <button onClick={() => setCart(cart.filter(c => c.code !== item.code))} className="absolute top-3 right-3 text-slate-200 hover:text-red-400 font-bold">✕</button>
                                    <div className="text-xs font-bold text-slate-700 leading-tight pr-4">{item.name}</div>
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center bg-slate-100 rounded-xl px-3 py-1 gap-4">
                                            <button onClick={() => setCart(cart.map(c => c.code === item.code ? {...c, count: Math.max(1, c.count-1)} : c))} className="text-slate-400 font-bold">-</button>
                                            <span className="text-xs font-black text-slate-800">{item.count}</span>
                                            <button onClick={() => addToCart(item)} className="text-slate-400 font-bold">+</button>
                                        </div>
                                        <span className="text-xs font-black text-slate-900">{(item.online * item.count).toLocaleString()}원</span>
                                    </div>
                                </div>
                            ))}
                            {cart.length === 0 && <div className="h-full flex flex-col items-center justify-center opacity-20 mt-20 font-bold text-xs"><p>제품을 담아주세요</p></div>}
                        </div>

                        <div className="p-6 bg-white border-t space-y-5 shadow-[0_-10px_40px_rgba(0,0,0,0.04)]">
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Overall Benefit</label>
                                <select className="w-full p-3.5 bg-slate-50 border-none rounded-2xl text-xs font-black text-blue-600 focus:ring-2 focus:ring-blue-500 outline-none" value={selectedPromo} onChange={e => setSelectedPromo(e.target.value)}>
                                    <option value="혜택을 선택하세요">혜택을 선택하세요</option>
                                    <option value="신규 회원 할인 (-5,000원)">신규 회원 할인 (-5,000원)</option>
                                    <option value="단품 3% 할인">단품 3% 할인</option>
                                    <option value="2개 이상 5% 할인">2개 이상 5% 할인</option>
                                    <option value="쿠폰 3단계 (7%) 할인">쿠폰 3단계 (7%) 할인</option>
                                    <option value="쿠폰 4단계 (10%) 할인">쿠폰 4단계 (10%) 할인</option>
                                    <option value="쿠폰 6단계 (15%) 할인">쿠폰 6단계 (15%) 할인</option>
                                </select>
                            </div>

                            <div className="text-right pt-2 border-t border-dashed border-gray-100">
                                <div className="text-[10px] font-bold text-slate-300 mb-1">정상가 {calc.retailSum.toLocaleString()}원</div>
                                <div className="text-3xl font-black text-blue-600 tracking-tighter mb-3">{calc.final.toLocaleString()}원</div>
                                <div className="flex flex-col gap-1 items-end">
                                    <span className="text-[10px] font-black bg-purple-50 text-purple-500 px-2 py-1 rounded-lg">정상 대비 -{calc.offRetail}%</span>
                                    <span className="text-[10px] font-black bg-emerald-50 text-emerald-500 px-2 py-1 rounded-lg">온라인 대비 -{calc.offOnline}%</span>
                                </div>
                            </div>

                            <div className="flex gap-2 pt-2">
                                <button onClick={handleSave} className="flex-1 py-4 bg-slate-100 text-slate-400 rounded-2xl text-[10px] font-black hover:bg-slate-200 transition-all uppercase">Memory</button>
                                <button onClick={() => window.print()} className="flex-[2] py-4 bg-slate-900 text-white rounded-2xl text-xs font-black shadow-xl active:scale-95 transition-all">견적서 저장</button>
                            </div>
                            
                            <div className="flex gap-1.5 overflow-x-auto no-scrollbar pt-2">
                                {savedQuotes.map((q, i) => (
                                    <button key={q.id} onClick={() => { if(confirm("이전 견적을 불러올까요?")) {setCart(q.cart); setSelectedPromo(q.promo);} }} className="flex-shrink-0 bg-blue-50 text-[9px] px-3 py-2 rounded-xl border border-blue-100 font-bold text-blue-500">#{savedQuotes.length-i} ({Math.round(q.total/10000)}만)</button>
                                ))}
                            </div>
                        </div>
                    </aside>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
