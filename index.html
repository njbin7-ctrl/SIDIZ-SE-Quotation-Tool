<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDIZ SE Quotation Tool</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; height: 100vh; overflow: hidden; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { transition: all 0.2s; border: 1px solid #f1f5f9; }
        .product-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SHEET_ID = "1af5u1NNvYs_ygLw3CnfWiZrp_IkvLcmUs1edO52p1kU";
        const GID = "1647057314";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        function App() {
            const [data, setData] = useState({ products: [], events: [], naverLive: "" });
            const [cart, setCart] = useState([]);
            const [selectedPromo, setSelectedPromo] = useState("혜택을 선택하세요");
            const [search, setSearch] = useState("");
            const [category, setCategory] = useState("전체");
            const [loading, setLoading] = useState(true);
            const [savedQuotes, setSavedQuotes] = useState(() => {
                const saved = localStorage.getItem('sidiz_memo_final');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                fetch(CSV_URL).then(res => res.text()).then(text => {
                    const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
                    const products = rows.slice(29).filter(r => r[2]).map(r => ({
                        series: r[0], sub: r[1], name: r[2], code: r[3],
                        retail: parseInt(r[4]?.replace(/[^0-9]/g, '')) || 0,
                        online: parseInt(r[5]?.replace(/[^0-9]/g, '')) || 0
                    }));
                    setData({ 
                        products, 
                        events: [{ name: rows[9]?.[1], desc: rows[11]?.[1] }, { name: rows[9]?.[2], desc: rows[11]?.[2] }].filter(e => e.name),
                        naverLive: rows[4]?.[1] || "확인 중" 
                    });
                    setLoading(false);
                });
            }, []);

            // [AI 스튜디오 최신 로직] 카테고리 무관 전체 검색 기능
            const filteredProducts = useMemo(() => {
                return data.products.filter(p => {
                    const query = search.toLowerCase();
                    const matchesSearch = p.name.toLowerCase().includes(query) || p.code.toLowerCase().includes(query);
                    
                    if (query.length > 0) return matchesSearch; // 검색어 있으면 전체 대상
                    return (category === "전체" || p.series === category) && matchesSearch; // 검색어 없으면 카테고리 필터
                });
            }, [data.products, search, category]);

            const calc = useMemo(() => {
                const oSum = cart.reduce((a, c) => a + (c.online * c.quantity), 0);
                const rSum = cart.reduce((a, c) => a + (c.retail * c.quantity), 0);
                let final = oSum;
                if (selectedPromo === "신규 회원 할인 (-5,000원)") final -= 5000;
                else if (selectedPromo.includes("%")) final = oSum * (1 - parseInt(selectedPromo.match(/\d+/)) / 100);
                return { oSum, rSum, final, offR: rSum > 0 ? ((1 - final/rSum)*100).toFixed(1) : 0 };
            }, [cart, selectedPromo]);

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-blue-600">데이터 연결 중...</div>;

            return (
                <div className="flex h-screen w-screen overflow-hidden">
                    <div className="flex-1 flex flex-col min-w-0 bg-white">
                        <header className="p-6 border-b flex-shrink-0">
                            <div className="flex justify-between items-center mb-4">
                                <h1 className="text-2xl font-black text-slate-800 tracking-tighter">SIDIZ <span className="text-blue-600">SE</span></h1>
                                <div className="bg-[#03C75A] text-white px-4 py-1 rounded-full text-[10px] font-black tracking-widest">LIVE: {data.naverLive}</div>
                            </div>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                {data.events.map((e, i) => (
                                    <div key={i} className="min-w-[200px] bg-slate-50 border p-3 rounded-2xl">
                                        <div className="text-[10px] font-bold text-blue-600">{e.name}</div>
                                        <div className="text-[9px] text-slate-400 line-clamp-1">{e.desc}</div>
                                    </div>
                                ))}
                            </div>
                        </header>
                        <main className="flex-1 flex flex-col p-6 overflow-hidden bg-slate-50/30">
                            <input type="text" placeholder="어떤 제품을 찾으시나요? (전체 검색 지원)" className="w-full p-4 bg-white border border-slate-200 rounded-2xl mb-4 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none" onChange={e => setSearch(e.target.value)} value={search} />
                            <div className="flex gap-2 mb-4 overflow-x-auto no-scrollbar">
                                {["전체", "게이밍", "워크", "스터디"].map(c => (
                                    <button key={c} onClick={() => {setCategory(c); setSearch("");}} className={`px-5 py-1.5 rounded-xl text-xs font-bold ${category === c && search === "" ? 'bg-slate-800 text-white' : 'bg-white border text-slate-400'}`}>{c}</button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 overflow-y-auto pr-2 no-scrollbar pb-20">
                                {filteredProducts.map((p, i) => (
                                    <div key={i} onClick={() => setCart(prev => {
                                        const ext = prev.find(item => item.code === p.code);
                                        if (ext) return prev.map(item => item.code === p.code ? {...item, quantity: item.quantity + 1} : item);
                                        return [...prev, {...p, quantity: 1}];
                                    })} className="product-card bg-white p-5 rounded-[2rem] flex flex-col h-full">
                                        <div className="text-[9px] font-bold text-blue-400 uppercase mb-1">{p.series}</div>
                                        <div className="text-xs font-bold text-slate-800 mb-4 h-8 line-clamp-2">{p.name}</div>
                                        <div className="mt-auto flex justify-between items-end border-t pt-3">
                                            <div className="text-sm font-black text-slate-900">{p.online.toLocaleString()}원</div>
                                            <div className="text-blue-600 font-bold">＋</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                    <aside className="w-80 sidebar-shadow bg-white flex flex-col h-full z-20">
                        <div className="p-6 border-b font-black text-slate-800 flex justify-between items-center h-[80px]">견적 대시보드 <span className="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full">{cart.length}</span></div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/50 no-scrollbar">
                            {cart.map(item => (
                                <div key={item.code} className="bg-white p-3 rounded-2xl border shadow-sm flex flex-col gap-2 relative">
                                    <button onClick={() => setCart(cart.filter(c => c.code !== item.code))} className="absolute top-2 right-2 text-slate-300 hover:text-red-400">✕</button>
                                    <div className="text-[11px] font-bold text-slate-700 truncate pr-4">{item.name}</div>
                                    <div className="flex justify-between items-center text-xs">
                                        <span className="font-bold">{item.quantity}개</span>
                                        <span className="font-black">{(item.online * item.quantity).toLocaleString()}원</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-6 bg-white border-t space-y-4 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
                            <select className="w-full p-3 bg-slate-50 border-none rounded-xl text-xs font-black text-blue-600 outline-none" value={selectedPromo} onChange={e => setSelectedPromo(e.target.value)}>
                                <option value="혜택을 선택하세요">혜택 선택</option>
                                <option value="신규 회원 할인 (-5,000원)">신규 회원 (-5,000)</option>
                                <option value="단품 3% 할인">단품 3% 할인</option>
                                <option value="2개 이상 5% 할인">다량 5% 할인</option>
                            </select>
                            <div className="text-right">
                                <div className="text-2xl font-black text-blue-600 tracking-tighter">{calc.final.toLocaleString()}원</div>
                                <div className="text-[10px] font-bold text-purple-400">정상가 대비 -{calc.offR}%</div>
                            </div>
                            <button onClick={() => window.print()} className="w-full py-4 bg-slate-900 text-white rounded-2xl text-xs font-black shadow-xl active:scale-95 transition-all">견적서 저장</button>
                        </div>
                    </aside>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
