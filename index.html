<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDIZ SE Quotation Tool</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; height: 100dvh; overflow: hidden; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 구글 시트 주소 (CSV 내보내기 형식)
        const SHEET_ID = "1af5u1NNvYs_ygLw3CnfWiZrp_IkvLcmUs1edO52p1kU";
        const GID = "1647057314";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        function App() {
            const [data, setData] = useState({ products: [], events: [], naverLive: "", coupons: [] });
            const [cart, setCart] = useState([]);
            const [selectedPromo, setSelectedPromo] = useState("혜택을 선택하세요");
            const [search, setSearch] = useState("");
            const [category, setCategory] = useState("전체");
            const [status, setStatus] = useState({ loading: true, error: null });
            const [savedQuotes, setSavedQuotes] = useState([]);

            // CSV 파싱 함수 (쉼표 포함 데이터 처리)
            const parseCSV = (text) => {
                const regex = /(".*?"|[^",\s]+)(?=\s*,|\s*$)/g;
                return text.split('\n').map(line => {
                    const matches = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    return matches ? matches.map(m => m.replace(/^"|"$/g, '').trim()) : [];
                });
            };

            useEffect(() => {
                const loadSheet = async () => {
                    try {
                        const res = await fetch(CSV_URL);
                        if (!res.ok) throw new Error("시트 데이터를 가져올 수 없습니다. 공유 설정을 확인해주세요.");
                        const text = await res.text();
                        const rows = parseCSV(text);

                        // 데이터 매핑 (사용자 시트 좌표 기준)
                        const naverLive = rows[4]?.[1] || "일정 확인 중";
                        const events = [
                            { name: rows[9]?.[1], desc: rows[11]?.[1] },
                            { name: rows[9]?.[2], desc: rows[11]?.[2] },
                            { name: rows[9]?.[3], desc: rows[11]?.[3] },
                            { name: rows[9]?.[4], desc: rows[11]?.[4] }
                        ].filter(e => e.name);

                        const products = rows.slice(29).filter(r => r[2]).map(r => ({
                            series: r[0], sub: r[1], name: r[2], code: r[3],
                            retail: parseInt(r[4]?.replace(/,/g, '')) || 0,
                            online: parseInt(r[5]?.replace(/,/g, '')) || 0
                        }));

                        setData({ products, events, naverLive });
                        setStatus({ loading: false, error: null });
                    } catch (err) {
                        setStatus({ loading: false, error: err.message });
                    }
                };
                loadSheet();
            }, []);

            // 계산 로직
            const calculation = useMemo(() => {
                const totalRetail = cart.reduce((acc, cur) => acc + (cur.retail * cur.count), 0);
                const totalOnline = cart.reduce((acc, cur) => acc + (cur.online * cur.count), 0);
                let finalPrice = totalOnline;

                if (selectedPromo === "신규 회원 할인 (-5,000원)") finalPrice -= 5000;
                else if (selectedPromo.includes("%")) {
                    const rate = parseInt(selectedPromo.match(/\d+/)) / 100;
                    finalPrice = totalOnline * (1 - rate);
                }

                return {
                    totalRetail, totalOnline, finalPrice,
                    offRetail: totalRetail > 0 ? ((1 - finalPrice / totalRetail) * 100).toFixed(1) : 0,
                    offOnline: totalOnline > 0 ? ((1 - finalPrice / totalOnline) * 100).toFixed(1) : 0
                };
            }, [cart, selectedPromo]);

            const addToCart = (p) => {
                setCart(prev => {
                    const ext = prev.find(i => i.code === p.code);
                    if (ext) return prev.map(i => i.code === p.code ? {...i, count: i.count + 1} : i);
                    return [...prev, { ...p, count: 1 }];
                });
            };

            if (status.loading) return <div className="h-screen flex items-center justify-center font-bold text-blue-600">데이터를 실시간으로 불러오고 있습니다...</div>;
            if (status.error) return <div className="h-screen flex flex-col items-center justify-center p-10 text-center"><p className="text-red-500 font-bold mb-4">에러: {status.error}</p><p className="text-sm text-gray-500">구글 시트의 [공유] 설정이 "링크가 있는 모든 사용자"로 되어 있는지 확인해주세요.</p></div>;

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    {/* 상단 프로모션 영역 */}
                    <header className="bg-white border-b p-4 no-print flex-shrink-0">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-xl font-black text-slate-800 tracking-tighter">SIDIZ <span className="text-blue-600">SE</span></h1>
                            <div className="bg-green-500 text-white px-3 py-1 rounded-lg text-xs font-bold">LIVE: {data.naverLive}</div>
                        </div>
                        <div className="flex gap-2 overflow-x-auto no-scrollbar">
                            {data.events.map((e, i) => (
                                <div key={i} className="min-w-[180px] bg-blue-50 border border-blue-100 p-2 rounded-xl">
                                    <div className="text-[10px] font-bold text-blue-600 mb-1">{e.name}</div>
                                    <div className="text-[9px] text-gray-500 line-clamp-1">{e.desc}</div>
                                </div>
                            ))}
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden">
                        {/* 좌측 제품 리스트 */}
                        <div className="flex-1 flex flex-col p-4 overflow-hidden">
                            <input 
                                type="text" placeholder="제품명 또는 단품코드를 검색하세요" 
                                className="w-full p-3 bg-gray-100 border-none rounded-2xl mb-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                                onChange={e => setSearch(e.target.value)}
                            />
                            <div className="flex gap-2 mb-4 overflow-x-auto no-scrollbar">
                                {["전체", "게이밍", "워크", "스터디", "리빙"].map(c => (
                                    <button key={c} onClick={() => setCategory(c)} className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap ${category === c ? 'bg-slate-800 text-white' : 'bg-white border text-gray-400'}`}>{c}</button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 overflow-y-auto pr-2 pb-20">
                                {data.products.filter(p => (category === "전체" || p.series.includes(category)) && (p.name.includes(search) || p.code.includes(search))).map((p, i) => (
                                    <div key={i} onClick={() => addToCart(p)} className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm hover:border-blue-400 cursor-pointer transition-all active:scale-95">
                                        <div className="text-[9px] font-bold text-blue-400 uppercase mb-1">{p.series}</div>
                                        <div className="text-xs font-bold text-gray-800 mb-2 truncate">{p.name}</div>
                                        <div className="text-right">
                                            <div className="text-[9px] text-gray-300 line-through mb-1">{p.retail.toLocaleString()}원</div>
                                            <div className="text-sm font-black text-gray-900">{p.online.toLocaleString()}원</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 우측 견적함 */}
                        <aside className="w-80 bg-slate-50 border-l p-4 flex flex-col no-print">
                            <h2 className="font-bold text-slate-800 mb-4 flex justify-between items-center">견적 대시보드 <span className="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full">{cart.length}개</span></h2>
                            <div className="flex-1 overflow-y-auto space-y-2 mb-4 no-scrollbar">
                                {cart.map(item => (
                                    <div key={item.code} className="bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                                        <div className="text-[10px] font-bold text-gray-800 mb-2 truncate">{item.name}</div>
                                        <div className="flex justify-between items-center">
                                            <div className="flex items-center bg-gray-100 rounded-lg p-1 gap-2">
                                                <button onClick={() => setCart(cart.map(c => c.code === item.code ? {...c, count: Math.max(1, c.count-1)} : c))} className="px-1">-</button>
                                                <span className="text-xs font-bold">{item.count}</span>
                                                <button onClick={() => addToCart(item)} className="px-1">+</button>
                                            </div>
                                            <span className="text-xs font-black">{(item.online * item.count).toLocaleString()}원</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="bg-white p-4 rounded-2xl border border-gray-200 space-y-4">
                                <select className="w-full p-2 bg-gray-50 border-none rounded-lg text-xs font-bold text-blue-600 outline-none" value={selectedPromo} onChange={e => setSelectedPromo(e.target.value)}>
                                    <option value="혜택을 선택하세요">혜택을 선택하세요</option>
                                    <option value="신규 회원 할인 (-5,000원)">신규 회원 할인 (-5,000원)</option>
                                    <option value="단품 3% 할인">단품 3% 할인</option>
                                    <option value="2개 이상 5% 할인">2개 이상 5% 할인</option>
                                    <option value="쿠폰 3단계 (7%) 할인">쿠폰 3단계 (7%) 할인</option>
                                    <option value="쿠폰 4단계 (10%) 할인">쿠폰 4단계 (10%) 할인</option>
                                    <option value="쿠폰 6단계 (15%) 할인">쿠폰 6단계 (15%) 할인</option>
                                </select>
                                <div className="text-right border-t pt-3">
                                    <div className="text-[10px] text-gray-300">정상가 {calculation.totalRetail.toLocaleString()}원</div>
                                    <div className="text-2xl font-black text-blue-600 tracking-tighter">{calculation.finalPrice.toLocaleString()}원</div>
                                    <div className="flex justify-end gap-2 text-[9px] font-bold">
                                        <span className="text-purple-400">정상 대비 -{calculation.offRetail}%</span>
                                        <span className="text-emerald-400">온라인 대비 -{calculation.offOnline}%</span>
                                    </div>
                                </div>
                                <button onClick={() => window.print()} className="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-xs shadow-lg active:scale-95 transition-all">견적서 저장 (PDF)</button>
                            </div>
                        </aside>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
