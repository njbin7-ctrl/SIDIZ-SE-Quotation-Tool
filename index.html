<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDIZ SE Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { transition: all 0.2s ease-in-out; border: 1px solid #f1f5f9; cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 15px 30px rgba(59, 130, 246, 0.08); }
        .sidebar-shadow { box-shadow: -10px 0 30px rgba(0,0,0,0.04); }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 아이콘 컴포넌트 (SVG) ---
        const IconSearch = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const IconCart = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>;
        const IconTrash = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconInfo = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;

        // --- 설정 ---
        const SHEET_ID = "1af5u1NNvYs_ygLw3CnfWiZrp_IkvLcmUs1edO52p1kU";
        const GID = "1647057314";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
        const FIXED_PROMOS = ['신규 회원 할인 (-5,000원)', '단품 3% 할인', '세트 5% 할인'];

        function App() {
            const [data, setData] = useState({ products: [], events: [], coupons: [], live: "" });
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            const [category, setCategory] = useState("전체");
            const [promo, setPromo] = useState("혜택을 선택하세요");
            const [loading, setLoading] = useState(true);
            const [promoOpen, setPromoOpen] = useState(false);
            const [saved, setSaved] = useState(() => JSON.parse(localStorage.getItem('sidiz_se_quotes') || '[]'));

            useEffect(() => {
                fetch(CSV_URL).then(r => r.text()).then(txt => {
                    Papa.parse(txt, { complete: (res) => {
                        const r = res.data;
                        const products = r.slice(29).filter(x => x[2] && x[2] !== "제품명").map(x => ({
                            s: x[0], n: x[2], c: x[3],
                            re: parseInt(x[4]?.replace(/,/g, '')) || 0,
                            on: parseInt(x[5]?.replace(/,/g, '')) || 0
                        }));
                        const coupons = r[16] ? r[16].slice(1).filter(v => v).map(v => ({ name: `${parseInt(v)}% 할인`, rate: parseInt(v)/100 })) : [];
                        const events = [];
                        for(let i=1; i<r[8].length; i++) {
                            if(r[8][i] && r[8][i] !== "행사명") events.push({ name: r[8][i], details: r[10][i], exc: r[11][i] });
                        }
                        setData({ products, events, coupons, live: r[4][1] });
                        setLoading(false);
                    }});
                });
            }, []);

            const filtered = useMemo(() => {
                const q = search.toLowerCase().trim();
                return data.products.filter(p => {
                    const m = p.n.toLowerCase().includes(q) || p.c.toLowerCase().includes(q);
                    return q !== "" ? m : (category === "전체" || p.s === category) && m;
                });
            }, [data.products, search, category]);

            const calc = useMemo(() => {
                const on = cart.reduce((s, i) => s + (i.on * i.qty), 0);
                const re = cart.reduce((s, i) => s + (i.re * i.qty), 0);
                let fi = on;
                const cp = data.coupons.find(c => c.name === promo);
                if (cp) fi = on * (1 - cp.rate);
                else if (promo === '단품 3% 할인') fi = on * 0.97;
                else if (promo === '세트 5% 할인') fi = on * 0.95;
                else if (promo.includes('5,000')) fi -= 5000;
                return { on, re, fi, offR: re > 0 ? ((1 - fi/re)*100).toFixed(1) : 0, offO: on > 0 ? ((1 - fi/on)*100).toFixed(1) : 0 };
            }, [cart, promo, data.coupons]);

            const saveQuote = () => {
                if(cart.length === 0 || saved.length >= 3) return;
                const newSaved = [{ id: Date.now(), cart: [...cart], promo, total: calc.fi }, ...saved];
                setSaved(newSaved);
                localStorage.setItem('sidiz_se_quotes', JSON.stringify(newSaved));
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-blue-600 text-xl animate-pulse">데이터를 동기화 중입니다...</div>;

            return (
                <div className="flex h-screen w-screen bg-white overflow-hidden">
                    <div className="flex-1 flex flex-col min-w-0">
                        <header className="flex-shrink-0 bg-white border-b">
                            <div className="px-8 h-16 flex items-center justify-between">
                                <h1 className="text-2xl font-black text-slate-800 tracking-tighter italic">SIDIZ <span className="text-blue-600">SE</span></h1>
                                <div className="bg-[#03C75A] text-white px-4 py-1.5 rounded-xl text-xs font-black shadow-sm">LIVE: {data.live}</div>
                            </div>
                            {/* 프로모션 안내 창 (원본 재현) */}
                            <div className="px-8 py-3 bg-slate-50 border-b">
                                <button onClick={() => setPromoOpen(!promoOpen)} className="flex items-center justify-between w-full group">
                                    <div className="flex items-center gap-2">
                                        <div className="text-blue-600"><IconInfo /></div>
                                        <span className="text-[11px] font-bold text-slate-500 uppercase tracking-widest">현재 진행 중인 프로모션 안내 ({data.events.length})</span>
                                    </div>
                                    <div className="text-slate-400">{promoOpen ? "▲" : "▼"}</div>
                                </button>
                                {promoOpen && (
                                    <div className="grid grid-cols-3 gap-3 mt-4 animate-in fade-in slide-in-from-top-2">
                                        {data.events.map((e, i) => (
                                            <div key={i} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                                <div className="text-[11px] font-black text-blue-600 mb-1">{e.name}</div>
                                                <div className="text-[10px] text-slate-500 leading-tight">{e.details}</div>
                                                {e.exc && <div className="text-[9px] text-red-400 mt-2">※ {e.exc}</div>}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </header>

                        <main className="flex-1 p-8 overflow-y-auto bg-[#fcfdfe] no-scrollbar">
                            <div className="relative mb-8 max-w-4xl mx-auto">
                                <div className="absolute left-6 top-5 text-slate-300"><IconSearch /></div>
                                <input type="text" placeholder="제품명 또는 단품코드를 검색하세요 (전체 검색 지원)" value={search} onChange={e => setSearch(e.target.value)} className="w-full p-5 pl-16 rounded-[2rem] border-none bg-white shadow-xl shadow-slate-200/50 outline-none focus:ring-4 focus:ring-blue-500/10 text-lg font-medium transition-all"/>
                            </div>
                            <div className="flex gap-2 mb-8 overflow-x-auto no-scrollbar">
                                {["전체", "게이밍", "워크", "스터디", "라이트워크", "리빙다이닝", "싯부스터", "그로잉", "P굿즈", "악세서리"].map(s => (
                                    <button key={s} onClick={() => {setCategory(s); setSearch("");}} className={`px-6 py-2.5 rounded-2xl text-sm font-bold whitespace-nowrap transition-all ${category === s && search === "" ? 'bg-slate-800 text-white shadow-xl' : 'bg-white border border-slate-100 text-slate-400 hover:bg-slate-50'}`}>{s}</button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-6 pb-20">
                                {filtered.map((p, i) => (
                                    <div key={i} onClick={() => setCart(v => {
                                        const e = v.find(x => x.c === p.c);
                                        return e ? v.map(x => x.c === p.c ? {...x, qty: x.qty+1} : x) : [...v, {...p, qty: 1}];
                                    })} className="product-card bg-white p-6 rounded-[2.5rem] flex flex-col h-full relative">
                                        <div className="text-[10px] font-black text-blue-400 uppercase mb-2 tracking-widest">{p.s}</div>
                                        <div className="text-[15px] font-bold text-slate-800 mb-6 h-12 line-clamp-2 leading-snug">{p.n}</div>
                                        <div className="mt-auto border-t pt-5 flex justify-between items-end">
                                            <div>
                                                <div className="text-[11px] text-slate-300 line-through mb-1 font-medium">{p.re.toLocaleString()}원</div>
                                                <div className="text-xl font-[900] text-slate-900 leading-none">{p.on.toLocaleString()}원</div>
                                            </div>
                                            <div className="w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-bold text-xl hover:bg-blue-600 hover:text-white transition-colors">＋</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>

                    <aside className="w-[400px] sidebar-shadow bg-white flex flex-col h-full z-20">
                        <div className="p-8 border-b flex justify-between items-center h-[100px]">
                            <h2 className="text-xl font-black text-slate-800 flex items-center gap-3"><IconCart /> 견적함 <span className="bg-blue-600 text-white px-2.5 py-0.5 rounded-full text-xs">{cart.length}</span></h2>
                            <button onClick={() => setCart([])} className="text-[10px] font-bold text-slate-300 hover:text-red-400 uppercase tracking-widest">Clear</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50 no-scrollbar">
                            {cart.map(i => (
                                <div key={i.c} className="bg-white p-5 rounded-[1.5rem] shadow-sm border border-slate-100 relative group animate-in slide-in-from-right-4">
                                    <button onClick={() => setCart(v => v.filter(x => x.c !== i.c))} className="absolute top-4 right-4 text-slate-200 hover:text-red-400"><IconTrash /></button>
                                    <div className="text-xs font-bold text-slate-700 leading-tight mb-4 pr-6">{i.n}</div>
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center bg-slate-100 rounded-xl px-2 py-1 gap-4 font-black text-xs">
                                            <button onClick={() => setCart(v => v.map(x => x.c === i.c ? {...x, qty: Math.max(1, x.qty-1)} : x))} className="w-6 h-6 hover:bg-white rounded-lg transition-colors">-</button>
                                            <span>{i.qty}</span>
                                            <button onClick={() => setCart(v => v.map(x => x.c === i.c ? {...x, qty: x.qty+1} : x))} className="w-6 h-6 hover:bg-white rounded-lg transition-colors">+</button>
                                        </div>
                                        <span className="text-sm font-black text-slate-900">{(i.on * i.qty).toLocaleString()}원</span>
                                    </div>
                                </div>
                            ))}
                            {cart.length === 0 && <div className="h-full flex flex-col items-center justify-center opacity-10 mt-32 font-black tracking-tighter text-4xl">EMPTY</div>}
                        </div>
                        <div className="p-8 bg-white border-t space-y-6 shadow-[0_-20px_50px_rgba(0,0,0,0.05)]">
                            <select value={promo} onChange={e => setPromo(e.target.value)} className="w-full p-4 bg-slate-50 border-none rounded-2xl text-[13px] font-black text-blue-600 focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                                <option value="혜택을 선택하세요">혜택을 선택하세요</option>
                                <optgroup label="금액대별 쿠폰 (시트 연동)">
                                    {data.coupons.map(c => <option key={c.name} value={c.name}>{c.name} 적용</option>)}
                                </optgroup>
                                <optgroup label="기타 프로모션">
                                    {FIXED_PROMOS.map(p => <option key={p} value={p}>{p}</option>)}
                                </optgroup>
                            </select>
                            <div className="text-right border-t border-dashed pt-6">
                                <div className="text-[11px] font-bold text-slate-300 mb-1">정상가 {calc.re.toLocaleString()}원</div>
                                <div className="text-4xl font-[900] text-blue-600 tracking-tighter mb-5">{calc.fi.toLocaleString()}<span className="text-xl">원</span></div>
                                <div className="flex flex-col gap-2 items-end">
                                    <span className="text-[11px] font-black bg-purple-50 text-purple-600 px-3 py-1.5 rounded-xl border border-purple-100">소비자가 대비 -{calc.offR}% 할인</span>
                                    <span className="text-[11px] font-black bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-xl border border-emerald-100">온라인 대비 -{calc.offO}% 추가 혜택</span>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <button onClick={saveQuote} disabled={saved.length>=3} className="py-4 bg-slate-100 text-slate-400 rounded-[1.25rem] text-[10px] font-black hover:bg-slate-200 uppercase tracking-widest transition-all disabled:opacity-30">Memo</button>
                                <button onClick={() => window.print()} className="py-4 bg-slate-900 text-white rounded-[1.25rem] text-xs font-black shadow-2xl active:scale-95 transition-all">견적서 저장</button>
                            </div>
                            {/* 기억하기 슬롯 (원본 재현) */}
                            {saved.length > 0 && (
                                <div className="flex gap-2 overflow-x-auto no-scrollbar pt-2 border-t border-dashed border-slate-100">
                                    {saved.map((q, i) => (
                                        <div key={q.id} className="relative group">
                                            <button onClick={() => { if(confirm("불러올까요?")) {setCart(q.cart); setPromo(q.promo);} }} className="bg-blue-50 text-[10px] px-3 py-2.5 rounded-xl border border-blue-100 font-bold text-blue-500 whitespace-nowrap">Slot #{saved.length-i} ({Math.round(q.total/10000)}만)</button>
                                            <button onClick={() => setSaved(v => v.filter(x => x.id !== q.id))} className="absolute -top-1 -right-1 bg-white text-red-400 rounded-full w-4 h-4 text-[8px] flex items-center justify-center shadow-md border opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </aside>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
