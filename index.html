<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDIZ SE Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { transition: all 0.2s ease; border: 1px solid #f1f5f9; cursor: pointer; }
        .product-card:hover { transform: translateY(-4px); border-color: #3b82f6; box-shadow: 0 12px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #3b82f6;">
            데이터를 연결 중입니다...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 아이콘을 여러 줄로 나누어 복사 오류 방지
        const IconSearch = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        );

        const IconCart = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
        );

        const IconTrash = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
        );

        const IconCalendar = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        const SHEET_ID = "1af5u1NNvYs_ygLw3CnfWiZrp_IkvLcmUs1edO52p1kU";
        const GID = "1647057314";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        function App() {
            const [data, setData] = useState({ products: [], events: [], naverLive: "" });
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            const [category, setCategory] = useState("전체");
            const [loading, setLoading] = useState(true);
            const [selectedPromo, setSelectedPromo] = useState("혜택을 선택하세요");
            const [savedQuotes, setSavedQuotes] = useState([]);

            useEffect(() => {
                const load = async () => {
                    try {
                        const res = await fetch(CSV_URL);
                        const text = await res.text();
                        Papa.parse(text, {
                            complete: (results) => {
                                const rows = results.data;
                                const products = rows.slice(29).filter(r => r[2] && r[2] !== "제품명").map(r => ({
                                    series: r[0]?.trim() || "기타",
                                    name: r[2]?.trim(),
                                    code: r[3]?.trim(),
                                    retail: parseInt(r[4]?.toString().replace(/,/g, '')) || 0,
                                    online: parseInt(r[5]?.toString().replace(/,/g, '')) || 0
                                }));
                                setData({
                                    naverLive: rows[4]?.[1] || "확인 중",
                                    events: [{ name: rows[9]?.[1], desc: rows[11]?.[1] }].filter(e => e.name),
                                    products
                                });
                                setLoading(false);
                            }
                        });
                    } catch (e) { alert("데이터 연결에 문제가 있습니다."); }
                };
                load();
            }, []);

            const filtered = useMemo(() => {
                const q = search.toLowerCase().trim();
                return data.products.filter(p => {
                    const match = p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q);
                    return q !== "" ? match : (category === "전체" || p.series === category) && match;
                });
            }, [data.products, search, category]);

            const calc = useMemo(() => {
                const totalOnline = cart.reduce((s, i) => s + (i.online * i.count), 0);
                const totalRetail = cart.reduce((s, i) => s + (i.retail * i.count), 0);
                let final = totalOnline;
                if (selectedPromo === "신규 회원 할인 (-5,000원)") final -= 5000;
                else if (selectedPromo.includes("%")) final = totalOnline * (1 - parseInt(selectedPromo.match(/\d+/)) / 100);
                return { 
                    totalOnline, totalRetail, final,
                    offR: totalRetail > 0 ? ((1 - final/totalRetail)*100).toFixed(1) : 0,
                    offO: totalOnline > 0 ? ((1 - final/totalOnline)*100).toFixed(1) : 0
                };
            }, [cart, selectedPromo]);

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-blue-600 text-xl animate-pulse">SIDIZ SE 스마트 대시보드 로딩 중...</div>;

            return (
                <div className="flex h-screen w-screen bg-white overflow-hidden">
                    <div className="flex-1 flex flex-col min-w-0">
                        <header className="p-6 border-b flex-shrink-0 bg-white">
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-2xl font-black text-slate-800 tracking-tighter">SIDIZ <span className="text-blue-600">SE</span></h1>
                                <div className="bg-emerald-500 text-white px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest flex items-center gap-2">
                                    <IconCalendar /> LIVE: {data.naverLive}
                                </div>
                            </div>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                                {['전체', ...new Set(data.products.map(p => p.series))].map(s => (
                                    <button key={s} onClick={() => {setCategory(s); setSearch("");}} className={`px-5 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all ${category === s && search === "" ? 'bg-slate-800 text-white shadow-lg' : 'bg-slate-50 text-slate-400 hover:bg-slate-100'}`}>{s}</button>
                                ))}
                            </div>
                        </header>

                        <main className="flex-1 p-6 overflow-y-auto bg-slate-50/30">
                            <div className="
