<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDIZ SE Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card { transition: all 0.2s; border: 1px solid #f1f5f9; background: white; border-radius: 1.5rem; padding: 1.25rem; cursor: pointer; }
        .card:hover { transform: translateY(-4px); border-color: #3b82f6; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 아이콘 (SVG 코드를 한 줄로 정리하여 용량 최적화)
        const IconSearch = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const IconCart = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>;
        const IconTrash = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;

        const CSV_URL = "https://docs.google.com/spreadsheets/d/1af5u1NNvYs_ygLw3CnfWiZrp_IkvLcmUs1edO52p1kU/export?format=csv&gid=1647057314";

        function App() {
            const [data, setData] = useState({ products: [], live: "" });
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            const [category, setCategory] = useState("전체");
            const [promo, setPromo] = useState("혜택 없음");
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch(CSV_URL).then(r => r.text()).then(txt => {
                    Papa.parse(txt, { complete: (res) => {
                        const rows = res.data;
                        const products = rows.slice(29).filter(r => r[2] && r[2] !== "제품명").map(r => ({
                            series: r[0] || "기타", name: r[2], code: r[3],
                            retail: parseInt(r[4]?.toString().replace(/,/g, '')) || 0,
                            online: parseInt(r[5]?.toString().replace(/,/g, '')) || 0
                        }));
                        setData({ live: rows[4]?.[1] || "확인중", products });
                        setLoading(false);
                    }});
                });
            }, []);

            const filtered = useMemo(() => {
                const q = search.toLowerCase().trim();
                return data.products.filter(p => {
                    const m = p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q);
                    return q !== "" ? m : (category === "전체" || p.series === category) && m;
                });
            }, [data.products, search, category]);

            const calc = useMemo(() => {
                const on = cart.reduce((s, i) => s + (i.online * i.count), 0);
                const re = cart.reduce((s, i) => s + (i.retail * i.count), 0);
                let fi = on;
                if (promo.includes("5,000")) fi -= 5000;
                else if (promo.includes("%")) fi = on * (1 - parseInt(promo)/100);
                return { on, re, fi, off: re > 0 ? ((1 - fi/re)*100).toFixed(1) : 0 };
            }, [cart, promo]);

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-blue-600">SIDIZ SE 로딩중...</div>;

            return (
                <div className="flex h-screen w-screen bg-white overflow-hidden">
                    {/* 메인 리스트 */}
                    <div className="flex-1 flex flex-col min-w-0">
                        <header className="p-6 border-b flex justify-between items-center bg-white">
                            <h1 className="text-2xl font-black text-slate-800 tracking-tighter italic">SIDIZ <span className="text-blue-600">SE</span></h1>
                            <div className="bg-emerald-500 text-white px-4 py-1.5 rounded-full text-[10px] font-black">LIVE: {data.live}</div>
                        </header>
                        <main className="flex-1 p-6 overflow-y-auto bg-slate-50/50">
                            <div className="relative mb-6">
                                <div className="absolute left-4 top-4 text-slate-300"><IconSearch /></div>
                                <input type="text" placeholder="제품명/코드로 전체 검색" value={search} onChange={e => setSearch(e.target.value)} className="w-full p-4 pl-12 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 bg-white font-medium"/>
                            </div>
                            <div className="flex gap-2 mb-6 overflow-x-auto no-scrollbar">
                                {["전체", ...new Set(data.products.map(p => p.series))].map(s => (
                                    <button key={s} onClick={() => {setCategory(s); setSearch("");}} className={`px-5 py-2 rounded-xl text-xs font-bold whitespace-nowrap ${category === s && search === "" ? 'bg-slate-800 text-white shadow-lg' : 'bg-white border text-slate-400'}`}>{s}</button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 pb-20">
                                {filtered.map((p, i) => (
                                    <div key={i} onClick={() => setCart(prev => {
                                        const ext = prev.find(item => item.code === p.code);
                                        if (ext) return prev.map(item => item.code === p.code ? {...item, count: item.count+1} : item);
                                        return [...prev, {...p, count: 1}];
                                    })} className="card flex flex-col h-full">
                                        <div className="text-[9px] font-black text-blue-400 uppercase mb-1 tracking-widest">{p.series}</div>
                                        <div className="text-xs font-bold text-slate-800 mb-4 h-10 line-clamp-2 leading-snug">{p.name}</div>
                                        <div className="mt-auto border-t pt-4 flex justify-between items-end">
                                            <div>
                                                <div className="text-[10px] text-slate-300 line-through">{p.retail.toLocaleString()}원</div>
                                                <div className="text-sm font-black text-slate-900">{p.online.toLocaleString()}원</div>
                                            </div>
                                            <div className="w-7 h-7 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-bold">＋</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                    {/* 오른쪽 견적함 */}
                    <aside className="w-80 border-l bg-white flex flex-col h-full shadow-[-10px_0_30px_rgba(0,0,0,0.02)]">
                        <div className="p-6 border-b flex justify-between items-center h-[80px]">
                            <h2 className="font-black text-slate-800 flex items-center gap-2 text-sm"><IconCart /> 견적함 <span className="text-[10px] bg-blue-600 text-white px-2 py-0.5 rounded-full">{cart.length}</span></h2>
                            <button onClick={() => setCart([])} className="text-[10px] font-bold text-slate-300 hover:text-red-400 uppercase">Clear</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/30 no-scrollbar">
                            {cart.map(item => (
                                <div key={item.code} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-50 relative">
                                    <button onClick={() => setCart(cart.filter(c => c.code !== item.code))} className="absolute top-3 right-3 text-slate-200 hover:text-red-400"><IconTrash /></button>
                                    <div className="text-[11px] font-bold text-slate-700 leading-tight pr-6 mb-3">{item.name}</div>
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center bg-slate-100 rounded-xl px-2 py-1 gap-4 text-xs font-bold">
                                            <button onClick={() => setCart(cart.map(c => c.code === item.code ? {...c, count: Math.max(1, c.count-1)} : c))}>-</button>
