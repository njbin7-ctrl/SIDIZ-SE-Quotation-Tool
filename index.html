<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDIZ SE Smart Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #eef2f6; }
        .product-card:hover { transform: translateY(-5px); border-color: #4f46e5; box-shadow: 0 12px 24px -8px rgba(79, 70, 229, 0.15); }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #4f46e5;">
            앱을 불러오는 중입니다... (30초 이상 지속되면 새로고침 해주세요)
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { Search, ShoppingCart, Trash2, Info, Calendar, Plus, ChevronDown, ChevronUp, X } = LucideReact;

        const SHEET_ID = "1af5u1NNvYs_ygLw3CnfWiZrp_IkvLcmUs1edO52p1kU";
        const GID = "1647057314";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        function App() {
            const [storeData, setStoreData] = useState(null);
            const [cart, setCart] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('전체');
            const [selectedPromo, setSelectedPromo] = useState('혜택을 선택하세요');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [savedQuotes, setSavedQuotes] = useState([]);

            // 데이터 로드 함수
            const loadData = async () => {
                try {
                    const response = await fetch(CSV_URL);
                    if (!response.ok) throw new Error("구글 시트 연결에 실패했습니다.");
                    const csvText = await response.text();
                    
                    Papa.parse(csvText, {
                        complete: (results) => {
                            const data = results.data;
                            const products = [];
                            // 제품 파싱 (30행부터)
                            for (let i = 29; i < data.length; i++) {
                                const row = data[i];
                                if (!row[2] || row[2] === '제품명') continue;
                                products.push({
                                    series: row[0]?.trim() || '기타',
                                    name: row[2]?.trim(),
                                    code: row[3]?.trim(),
                                    retailPrice: parseInt(row[4]?.toString().replace(/,/g, '')) || 0,
                                    onlinePrice: parseInt(row[5]?.toString().replace(/,/g, '')) || 0
                                });
                            }
                            setStoreData({
                                naverLiveDate: data[4]?.[1] || '확인 중',
                                events: [{ name: data[9]?.[1], desc: data[11]?.[1] }].filter(e => e.name),
                                coupons: data[16] ? data[16].slice(1).map(rate => ({ 
                                    name: `${parseInt(rate)}% 할인`, 
                                    rate: parseInt(rate)/100 
                                })).filter(c => !isNaN(c.rate)) : [],
                                products: products
                            });
                            setLoading(false);
                        },
                        error: (err) => setError("데이터 파싱 중 오류가 발생했습니다.")
                    });
                } catch (err) {
                    setError(err.message);
                    setLoading(false);
                }
            };

            useEffect(() => { loadData(); }, []);

            // 검색 및 필터 로직
            const filteredProducts = useMemo(() => {
                if (!storeData) return [];
                const query = searchQuery.toLowerCase();
                return storeData.products.filter(p => {
                    const matchSearch = p.name.toLowerCase().includes(query) || p.code.toLowerCase().includes(query);
                    if (query !== '') return matchSearch;
                    return selectedCategory === '전체' || p.series === selectedCategory;
                });
            }, [storeData, searchQuery, selectedCategory]);

            // 합계 계산 로직
            const calc = useMemo(() => {
                const totalOnline = cart.reduce((s, i) => s + (i.onlinePrice * i.quantity), 0);
                const totalRetail = cart.reduce((s, i) => s + (i.retailPrice * i.quantity), 0);
                let final = totalOnline;

                if (selectedPromo.includes('%')) {
                    const rate = parseInt(selectedPromo.match(/\d+/)) / 100;
                    final = totalOnline * (1 - rate);
                } else if (selectedPromo.includes('5,000')) {
                    final = Math.max(0, totalOnline - 5000);
                }

                return { 
                    totalRetail, totalOnline, final,
                    offRetail: totalRetail > 0 ? ((1 - final/totalRetail)*100).toFixed(1) : 0,
                    offOnline: totalOnline > 0 ? ((1 - final/totalOnline)*100).toFixed(1) : 0
                };
            }, [cart, selectedPromo]);

            if (error) return <div className="h-screen flex flex-col items-center justify-center p-8 text-center"><p className="text-red-500 font-bold mb-4">{error}</p><button onClick={() => window.location.reload()} className="px-6 py-2 bg-indigo-600 text-white rounded-xl">다시 시도</button></div>;
            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-indigo-600 animate-pulse text-lg">SIDIZ SE 스마트 대시보드 로드 중...</div>;

            return (
                <div className="flex h-screen w-screen bg-gray-50 overflow-hidden">
                    {/* [L] 제품 영역 */}
                    <div className="flex-1 flex flex-col bg-white overflow-hidden">
                        <header className="p-6 border-b border-gray-100 flex-shrink-0">
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-2xl font-black text-slate-800 tracking-tighter">SIDIZ <span className="text-indigo-600">SE</span></h1>
                                <div className="bg-[#03C75A] text-white px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2">
                                    <Calendar className="w-4 h-4"/> LIVE: {storeData.naverLiveDate}
                                </div>
                            </div>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                                {['전체', ...new Set(storeData.products.map(p => p.series))].map(s => (
                                    <button key={s} onClick={() => {setSelectedCategory(s); setSearchQuery('');}} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all whitespace-nowrap ${selectedCategory === s ? 'bg-indigo-600 text-white shadow-lg' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>{s}</button>
                                ))}
                            </div>
                        </header>

                        <main className="flex-1 p-6 overflow-y-auto bg-gray-50/50">
                            <div className="relative mb-6">
                                <Search className="absolute left-4 top-4 text-gray-400 w-5 h-5"/>
                                <input type="text" placeholder="제품명 또는 코드로 검색 (전체 검색 지원)" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full p-4 pl-12 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm font-medium"/>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4 pb-20">
                                {filteredProducts.map((p, i) => (
                                    <div key={i} onClick={() => setCart(prev => {
                                        const ext = prev.find(item => item.code === p.code);
                                        if (ext) return prev.map(item => item.code === p.code ? {...item, quantity: item.quantity+1} : item);
                                        return [...prev, {...p, quantity: 1}];
                                    })} className="product-card bg-white p-4 rounded-3xl cursor-pointer flex flex-col h-full">
                                        <div className="text-[9px] font-black text-indigo-400 uppercase mb-1">{p.series}</div>
                                        <div className="text-xs font-bold text-gray-800 mb-4 h-10 line-clamp-2">{p.name}</div>
                                        <div className="mt-auto border-t pt-4 flex justify-between items-end">
                                            <div>
                                                <div className="text-[10px] text-gray-300 line-through">{p.retailPrice.toLocaleString()}원</div>
                                                <div className="text-sm font-black text-gray-900">{p.onlinePrice.toLocaleString()}원</div>
                                            </div>
                                            <div className="w-7 h-7 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center font-bold">＋</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>

                    {/* [R] 견적 영역 */}
                    <aside className="w-80 border-l border-gray-200 bg-white flex flex-col h-full shadow-[-10px_0_30px_rgba(0,0,0,0.02)]">
                        <div className="p-6 border-b flex justify-between items-center h-[80px]">
                            <h2 className="font-black text-gray-800 flex items-center gap-2 text-base"><ShoppingCart className="w-5 h-5 text-indigo-600"/> 견적함 <span className="text-xs bg-indigo-600 text-white px-2 py-0.5 rounded-full">{cart.length}</span></h2>
                            <button onClick={() => setCart([])} className="text-[10px] font-bold text-gray-300 hover:text-red-400">비우기</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50/30 no-scrollbar">
                            {cart.map(item => (
                                <div key={item.code} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col gap-3 relative">
                                    <button onClick={() => setCart(cart.filter(c => c.code !== item.code))} className="absolute top-3 right-3 text-slate-200 hover:text-red-400">✕</button>
                                    <div className="text-xs font-bold text-gray-700 leading-tight pr-6">{item.name}</div>
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center bg-gray-100 rounded-xl px-2 py-1 gap-3">
                                            <button onClick={() => setCart(cart.map(c => c.code === item.code ? {...c, quantity: Math.max(1, c.quantity-1)} : c))} className="text-gray-400 font-bold">-</button>
                                            <span className="text-xs font-black">{item.quantity}</span>
                                            <button onClick={() => setCart(cart.map(c => c.code === item.code ? {...c, quantity: c.quantity+1} : c))} className="text-gray-400 font-bold">+</button>
                                        </div>
                                        <span className="text-xs font-black">{(item.onlinePrice * item.quantity).toLocaleString()}원</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        {cart.length > 0 && (
                            <div className="p-6 bg-white border-t space-y-5 shadow-[0_-15px_40px_rgba(0,0,0,0.04)]">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">최종 혜택 선택</label>
                                    <select value={selectedPromo} onChange={e => setSelectedPromo(e.target.value)} className="w-full p-3 bg-indigo-50 border-none rounded-xl text-xs font-black text-indigo-600 outline-none">
                                        <option value="혜택을 선택하세요">혜택을 선택하세요</option>
                                        <option value="신규 회원 할인 (-5,000원)">신규 회원 할인 (-5,000원)</option>
                                        {storeData.coupons.map(c => <option key={c.name} value={c.name}>{c.name} 적용</option>)}
                                    </select>
                                </div>
                                <div className="text-right pt-2 border-t border-dashed">
                                    <div className="text-[10px] text-gray-300 font-bold mb-1">정상가 {calc.totalRetail.toLocaleString()}원</div>
                                    <div className="text-2xl font-[900] text-indigo-600 tracking-tighter mb-4">{calc.final.toLocaleString()}원</div>
                                    <div className="flex flex-col gap-1.5 items-end">
                                        <span className="text-[9px] font-black bg-purple-50 text-purple-500 px-2 py-1 rounded-lg">소비자가 대비 -{calc.offRetail}%</span>
                                        <span className="text-[9px] font-black bg-emerald-50 text-emerald-500 px-2 py-1 rounded-lg">온라인 대비 -{calc.offOnline}%</span>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => { if(cart.length>0) setSavedQuotes([{id:Date.now(), cart:[...cart], promo:selectedPromo, total:calc.final}, ...savedQuotes].slice(0,3)); }} className="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl text-[10px] font-black hover:bg-gray-200 uppercase">Memo</button>
                                    <button onClick={() => window.print()} className="flex-[2] py-4 bg-gray-900 text-white rounded-2xl text-xs font-black shadow-xl active:scale-95 transition-all">견적서 저장</button>
                                </div>
                            </div>
                        )}
                    </aside>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
