<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDIZ SE Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card { transition: all 0.2s; border: 1px solid #f1f5f9; background: white; border-radius: 1.5rem; padding: 1.25rem; cursor: pointer; }
        .card:hover { border-color: #3b82f6; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transform: translateY(-3px); }
    </style>
</head>
<body>
    <div id="root"><div style="height:100vh;display:flex;align-items:center;justify-content:center;color:#3b82f6;font-weight:900;">연결 중...</div></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const IconS = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconC = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>;
        const CSV = "https://docs.google.com/spreadsheets/d/1af5u1NNvYs_ygLw3CnfWiZrp_IkvLcmUs1edO52p1kU/export?format=csv&gid=1647057314";

        function App() {
            const [data, setData] = useState({ p: [], live: "" });
            const [cart, setCart] = useState([]);
            const [q, setQ] = useState("");
            const [cat, setCat] = useState("전체");
            const [pro, setPro] = useState("혜택 없음");
            const [load, setLoad] = useState(true);

            useEffect(() => {
                fetch(CSV).then(r => r.text()).then(t => {
                    Papa.parse(t, { complete: (res) => {
                        const r = res.data;
                        const p = r.slice(29).filter(x => x[2] && x[2] !== "제품명").map(x => ({
                            s: x[0] || "기타", n: x[2], c: x[3],
                            re: parseInt(x[4]?.toString().replace(/,/g, '')) || 0,
                            on: parseInt(x[5]?.toString().replace(/,/g, '')) || 0
                        }));
                        setData({ live: r[4]?.[1] || "확인중", p });
                        setLoad(false);
                    }});
                });
            }, []);

            const filtered = useMemo(() => {
                const search = q.toLowerCase().trim();
                return data.p.filter(x => {
                    const m = x.n.toLowerCase().includes(search) || x.c.toLowerCase().includes(search);
                    return search !== "" ? m : (cat === "전체" || x.s === cat) && m;
                });
            }, [data.p, q, cat]);

            const res = useMemo(() => {
                const on = cart.reduce((s, i) => s + (i.on * i.qty), 0);
                const re = cart.reduce((s, i) => s + (i.re * i.qty), 0);
                let fi = on;
                if (pro.includes("5,000")) fi -= 5000;
                else if (pro.includes("%")) fi = on * (1 - parseInt(pro)/100);
                return { on, re, fi, off: re > 0 ? ((1 - fi/re)*100).toFixed(1) : 0 };
            }, [cart, pro]);

            if (load) return <div className="h-screen flex items-center justify-center font-black text-blue-600">SIDIZ SE 로딩중...</div>;

            return (
                <div className="flex h-screen w-screen bg-white">
                    <div className="flex-1 flex flex-col min-w-0">
                        <header className="p-6 border-b flex justify-between items-center bg-white">
                            <h1 className="text-2xl font-black text-slate-800 italic">SIDIZ <span className="text-blue-600">SE</span></h1>
                            <div className="bg-emerald-500 text-white px-4 py-1 rounded-full text-[10px] font-black">LIVE: {data.live}</div>
                        </header>
                        <main className="flex-1 p-6 overflow-y-auto bg-slate-50/50">
                            <div className="relative mb-6">
                                <div className="absolute left-4 top-4 text-slate-300"><IconS /></div>
                                <input type="text" placeholder="제품명/코드로 검색 (전체 검색 지원)" value={q} onChange={e => setQ(e.target.value)} className="w-full p-4 pl-12 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 bg-white font-medium"/>
                            </div>
                            <div className="flex gap-2 mb-6 overflow-x-auto no-scrollbar">
                                {["전체", ...new Set(data.p.map(x => x.s))].map(s => (
                                    <button key={s} onClick={() => {setCat(s); setQ("");}} className={`px-5 py-2 rounded-xl text-xs font-bold whitespace-nowrap ${cat === s && q === "" ? 'bg-slate-800 text-white' : 'bg-white border text-slate-400'}`}>{s}</button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 pb-20">
                                {filtered.map((p, i) => (
                                    <div key={i} onClick={() => setCart(v => {
                                        const e = v.find(x => x.c === p.c);
                                        return e ? v.map(x => x.c === p.c ? {...x, qty: x.qty+1} : x) : [...v, {...p, qty: 1}];
                                    })} className="card flex flex-col h-full">
                                        <div className="text-[9px] font-black text-blue-400 uppercase mb-1">{p.s}</div>
                                        <div className="text-xs font-bold text-slate-800 mb-4 h-10 line-clamp-2 leading-snug">{p.n}</div>
                                        <div className="mt-auto border-t pt-4 flex justify-between items-end">
                                            <div><div className="text-[10px] text-slate-300 line-through">{p.re.toLocaleString()}원</div><div className="text-sm font-black text-slate-900">{p.on.toLocaleString()}원</div></div>
                                            <div className="w-7 h-7 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-bold">＋</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                    <aside className="w-80 border-l bg-white flex flex-col h-full shadow-lg">
                        <div className="p-6 border-b flex justify-between items-center h-[80px]">
                            <h2 className="font-black text-slate-800 flex items-center gap-2 text-sm"><IconC /> 견적함 <span className="text-[10px] bg-blue-600 text-white px-2 py-0.5 rounded-full">{cart.length}</span></h2>
                            <button onClick={() => setCart([])} className="text-[10px] font-bold text-slate-300">Clear</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/30">
                            {cart.map(i => (
                                <div key={i.c} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">
                                    <div className="text-[11px] font-bold text-slate-700 leading-tight mb-3">{i.n}</div>
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center bg-slate-100 rounded-lg px-2 py-1 gap-3 text-xs font-bold">
                                            <button onClick={() => setCart(v => v.map(x => x.c === i.c ? {...x, qty: Math.max(1, x.qty-1)} : x))}>-</button>
                                            <span>{i.qty}</span>
                                            <button onClick={() => setCart(v => v.map(x => x.c === i.c ? {...x, qty: x.qty+1} : x))}>+</button>
                                        </div>
                                        <span className="text-xs font-black">{(i.on * i.qty).toLocaleString()}원</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        {cart.length > 0 && (
                            <div className="p-6 bg-white border-t space-y-4">
                                <select value={pro} onChange={e => setPro(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-xs font-black text-blue-600 outline-none">
                                    <option value="혜택 없음">혜택을 선택하세요</option>
                                    <option value="신규 -5,000">신규 회원 (-5,000원)</option>
                                    <option value="단품 3% 할인">단품 3% 할인</option>
                                    <option value="세트 5% 할인">세트 5% 할인</option>
                                    <option value="15% 할인">쿠폰 6단계 (15%) 할인</option>
                                </select>
                                <div className="text-right border-t border-dashed pt-4">
                                    <div className="text-[10px] font-bold text-slate-300 mb-1">정상가 {res.re.toLocaleString()}원</div>
                                    <div className="text-2xl font-black text-blue-600 tracking-tighter mb-4">{res.fi.toLocaleString()}원</div>
                                    <span className="text-[9px] font-black bg-purple-50 text-purple-500 px-2 py-1 rounded-lg">정상 대비 -{res.off}%</span>
                                </div>
                                <button onClick={() => window.print()} className="w-full py-4 bg-slate-900 text-white rounded-2xl text-xs font-black shadow-xl">견적서 저장</button>
                            </div>
                        )}
                    </aside>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
