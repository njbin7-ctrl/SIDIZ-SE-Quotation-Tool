<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDIZ SE Smart Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { transition: all 0.2s ease; border: 1px solid #f1f5f9; cursor: pointer; }
        .product-card:hover { transform: translateY(-4px); border-color: #3b82f6; box-shadow: 0 12px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #4f46e5;">
            시디즈 대시보드를 불러오고 있습니다...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 아이콘 직접 구현 (라이브러리 에러 방지)
        const IconSearch = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const IconCart = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>;
        const IconTrash = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;

        const SHEET_ID = "1af5u1NNvYs_ygLw3CnfWiZrp_IkvLcmUs1edO52p1kU";
        const GID = "1647057314";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        function App() {
            const [data, setData] = useState({ products: [], events: [], naverLive: "" });
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            const [category, setCategory] = useState("전체");
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const res = await fetch(CSV_URL);
                        const text = await res.text();
                        Papa.parse(text, {
                            complete: (results) => {
                                const rows = results.data;
                                const products = rows.slice(29).filter(r => r[2] && r[2] !== "제품명").map(r => ({
                                    series: r[0]?.trim() || "기타",
                                    name: r[2]?.trim(),
                                    code: r[3]?.trim(),
                                    retail: parseInt(rowToNum(r[4])) || 0,
                                    online: parseInt(rowToNum(r[5])) || 0
                                }));
                                setData({
                                    naverLive: rows[4]?.[1] || "확인 중",
                                    events: [{ name: rows[9]?.[1], desc: rows[11]?.[1] }].filter(e => e.name),
                                    products
                                });
                                setLoading(false);
                            }
                        });
                    } catch (e) { console.error(e); }
                };
                loadData();
            }, []);

            const rowToNum = (val) => val ? val.toString().replace(/,/g, '') : "0";

            const filtered = useMemo(() => {
                const q = search.toLowerCase();
                return data.products.filter(p => {
                    const match = p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q);
                    return q !== "" ? match : (category === "전체" || p.series === category) && match;
                });
            }, [data.products, search, category]);

            const calc = useMemo(() => {
                const totalOnline = cart.reduce((s, i) => s + (i.online * i.count), 0);
                const totalRetail = cart.reduce((s, i) => s + (i.retail * i.count), 0);
                return { 
                    totalOnline, totalRetail, 
                    offRetail: totalRetail > 0 ? ((1 - totalOnline/totalRetail)*100).toFixed(1) : 0 
                };
            }, [cart]);

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-blue-600">SIDIZ SE 로딩 중...</div>;

            return (
                <div className="flex h-screen w-screen bg-white overflow-hidden">
                    {/* 왼쪽 영역 */}
                    <div className="flex-1 flex flex-col min-w-0">
                        <header className="p-6 border-b flex-shrink-0">
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-2xl font-black text-slate-800 tracking-tighter italic">SIDIZ <span className="text-blue-600">
