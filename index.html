    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            Search, ShoppingCart, Trash2, Info, Calendar, Plus, 
            CheckCircle2, ChevronDown, ChevronUp, X 
        } = LucideReact;

        // --- 1. [calculator.ts] 로직 통합 ---
        const FIXED_PROMO_OPTIONS = ['신규 회원 할인 (-5,000원)', '단품 3% 할인', '세트 5% 할인'];

        const calculateBestPrice = (cart, storeData, globalPromo) => {
            if (cart.length === 0) return null;
            const totalRetailPrice = cart.reduce((sum, item) => sum + item.retailPrice * item.quantity, 0);
            const totalOnlinePrice = cart.reduce((sum, item) => sum + item.onlinePrice * item.quantity, 0);
            let finalTotalPrice = totalOnlinePrice;
            let appliedDiscountName = globalPromo || '혜택을 선택하세요';

            if (globalPromo && globalPromo !== '혜택을 선택하세요') {
                const selectedCoupon = storeData.coupons.find(c => c.name === globalPromo);
                if (selectedCoupon) {
                    finalTotalPrice = totalOnlinePrice * (1 - selectedCoupon.discountRate);
                } else {
                    switch (globalPromo) {
                        case '단품 3% 할인': finalTotalPrice = totalOnlinePrice * 0.97; break;
                        case '세트 5% 할인': finalTotalPrice = totalOnlinePrice * 0.95; break;
                        case '신규 회원 할인 (-5,000원)': finalTotalPrice = Math.max(0, totalOnlinePrice - 5000); break;
                    }
                }
            }

            return {
                items: cart.map(item => ({ ...item, appliedPrice: item.onlinePrice })),
                totalRetailPrice, totalOnlinePrice, finalTotalPrice, appliedDiscountName,
                retailDiscountRate: totalRetailPrice > 0 ? (1 - finalTotalPrice / totalRetailPrice) * 100 : 0,
                onlineDiscountRate: totalOnlinePrice > 0 ? (1 - finalTotalPrice / totalOnlinePrice) * 100 : 0
            };
        };

        // --- 2. [dataService.ts] 로직 통합 ---

            if (!str) return 0;
            return parseInt(str.toString().replace(/,/g, '').replace(/%/g, ''), 10);
        };

            const response = await fetch(url);
            const csvText = await response.text();
            const { data } = Papa.parse(csvText, { skipEmptyLines: false });

                    });
                }
            }
