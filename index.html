<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDIZ SE Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { transition: all 0.2s; border: 1px solid #f1f5f9; cursor: pointer; background: white; border-radius: 2rem; }
        .product-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="root"><div style="height:100vh;display:flex;align-items:center;justify-content:center;color:#3b82f6;font-weight:900;">연결 중...</div></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const IconS = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconC = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>;
        const CSV = "https://docs.google.com/spreadsheets/d/1af5u1NNvYs_ygLw3CnfWiZrp_IkvLcmUs1edO52p1kU/export?format=csv&gid=1647057314";

        function App() {
            const [data, setData] = useState({ p: [], ev: [], co: [], live: "" });
            const [cart, setCart] = useState([]);
            const [q, setQ] = useState("");
            const [cat, setCat] = useState("전체");
            const [sub, setSub] = useState("전체");
            const [pro, setPro] = useState("혜택을 선택하세요");
            const [load, setLoad] = useState(true);
            const [evOpen, setEvOpen] = useState(false);
            const [saved, setSaved] = useState(() => JSON.parse(localStorage.getItem('sidiz_memo') || '[]'));

            useEffect(() => {
                fetch(CSV).then(r => r.text()).then(t => {
                    Papa.parse(t, { complete: (res) => {
                        const r = res.data;
                        const p = r.slice(29).filter(x => x[2] && x[2] !== "제품명").map(x => ({
                            s: x[0], cat: x[1], n: x[2], c: x[3],
                            re: parseInt(x[4]?.replace(/,/g, '')) || 0,
                            on: parseInt(x[5]?.replace(/,/g, '')) || 0
                        }));
                        const co = r[16] ? r[16].slice(1).filter(v => v).map(v => ({ n: `${parseInt(v)}% 할인`, r: parseInt(v)/100 })) : [];
                        const ev = [];
                        for(let i=1; i<r[8].length; i++) if(r[8][i] && r[8][i] !== "행사명") ev.push({ n: r[8][i], d: r[10][i] });
                        setData({ p, ev, co, live: r[4][1] });
                        setLoad(false);
                    }});
                });
            }, []);

            const filtered = useMemo(() => {
                const search = q.toLowerCase().trim();
                return data.p.filter(x => {
                    const m = x.n.toLowerCase().includes(search) || x.c.toLowerCase().includes(search);
                    if (search !== "") return m;
                    return (cat === "전체" || x.s === cat) && (sub === "전체" || x.cat === sub);
                });
            }, [data.p, q, cat, sub]);

            const subCats = useMemo(() => {
                if (cat === "전체") return [];
                return ["전체", ...new Set(data.p.filter(x => x.s === cat).map(x => x.cat))];
            }, [cat, data.p]);

            const res = useMemo(() => {
                const on = cart.reduce((s, i) => s + (i.on * i.qty), 0);
                const re = cart.reduce((s, i) => s + (i.re * i.qty), 0);
                let fi = on;
                const cpn = data.co.find(c => c.n === pro);
                if (cpn) fi = on * (1 - cpn.r);
                else if (pro === "단품 3% 할인") fi = on * 0.97;
                else if (pro === "세트 5% 할인") fi = on * 0.95;
                else if (pro.includes("5,000")) fi -= 5000;
                return { on, re, fi, offR: re > 0 ? ((1 - fi/re)*100).toFixed(1) : 0, offO: on > 0 ? ((1 - fi/on)*100).toFixed(1) : 0 };
            }, [cart, pro, data.co]);

            if (load) return <div className="h-screen flex items-center justify-center font-black text-blue-600">SIDIZ SE 로딩중...</div>;

            return (
                <div className="flex h-screen w-screen bg-white overflow-hidden">
                    <div className="flex-1 flex flex-col min-w-0 border-r">
                        <header className="border-b bg-white">
                            <div className="px-8 h-16 flex items-center justify-between">
                                <h1 className="text-2xl font-black italic">SIDIZ <span className="text-blue-600">SE</span></h1>
                                <div className="bg-[#03C75A] text-white px-4 py-1.5 rounded-xl text-xs font-black">LIVE: {data.live}</div>
                            </div>
                            <div className="px-8 py-3 bg-slate-50 border-b">
                                <button onClick={() => setEvOpen(!evOpen)} className="flex items-center justify-between w-full text-[11px] font-bold text-slate-500 uppercase tracking-widest">
                                    <span>📢 프로모션 안내 ({data.ev.length})</span>
                                    <span>{evOpen ? "▲" : "▼"}</span>
                                </button>
                                {evOpen && <div className="grid grid-cols-3 gap-3 mt-3">
                                    {data.ev.map((e, i) => <div key={i} className="bg-white p-3 rounded-xl border text-[10px]"><div className="font-black text-blue-600 mb-1">{e.n}</div><div className="text-slate-500">{e.d}</div></div>)}
                                </div>}
                            </div>
                        </header>
                        <main className="flex-1 p-8 overflow-y-auto bg-slate-50/30 no-scrollbar">
                            <div className="relative mb-8 max-w-2xl mx-auto">
                                <div className="absolute left-5 top-4 text-slate-300"><IconS /></div>
                                <input type="text" placeholder="제품명/코드로 검색" value={q} onChange={e => setQ(e.target.value)} className="w-full p-4 pl-14 rounded-full border-none shadow-lg outline-none focus:ring-2 focus:ring-blue-500 font-medium"/>
                            </div>
                            <div className="flex gap-2 mb-4 overflow-x-auto no-scrollbar">
                                {["전체", ...new Set(data.p.map(x => x.s))].map(s => <button key={s} onClick={() => {setCat(s); setSub("전체"); setQ("");}} className={`px-5 py-2 rounded-xl text-xs font-bold whitespace-nowrap ${cat === s && q === "" ? 'bg-slate-800 text-white shadow-lg' : 'bg-white border text-slate-400'}`}>{s}</button>)}
                            </div>
                            {subCats.length > 0 && <div className="flex gap-2 mb-6 overflow-x-auto no-scrollbar pb-2">
                                {subCats.map(c => <button key={c} onClick={() => setSub(c)} className={`px-4 py-1.5 rounded-full text-[10px] font-bold border ${sub === c ? 'bg-blue-100 text-blue-700 border-blue-200' : 'bg-white text-slate-400'}`}>{c}</button>)}
                            </div>}
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-6 pb-20">
                                {filtered.map((p, i) => (
                                    <div key={i} onClick={() => setCart(v => {
                                        const e = v.find(x => x.c === p.c);
                                        return e ? v.map(x => x.c === p.c ? {...x, qty: x.qty+1} : x) : [...v, {...p, qty: 1}];
                                    })} className="product-card p-6 flex flex-col h-full">
                                        <div className="text-[9px] font-black text-blue-400 uppercase mb-2">{p.s}</div>
                                        <div className="text-[14px] font-bold text-slate-800 mb-4 h-10 line-clamp-2">{p.n}</div>
                                        <div className="mt-auto border-t pt-4 flex justify-between items-end">
                                            <div><div className="text-[10px] text-slate-300 line-through">{p.re.toLocaleString()}원</div><div className="text-lg font-black">{p.on.toLocaleString()}원</div></div>
                                            <div className="w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-bold text-xl">＋</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                    <aside className="w-96 bg-white flex flex-col h-full shadow-xl z-20">
                        <div className="p-8 border-b flex justify-between items-center h-[100px]">
                            <h2 className="text-xl font-black flex items-center gap-2"><IconC /> 견적함 <span className="bg-blue-600 text-white px-2 py-0.5 rounded-full text-xs">{cart.length}</span></h2>
                            <button onClick={() => setCart([])} className="text-[10px] font-bold text-slate-300">CLEAR</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50 no-scrollbar">
                            {cart.map(i => (
                                <div key={i.c} className="bg-white p-4 rounded-2xl border shadow-sm relative">
                                    <button onClick={() => setCart(v => v.filter(x => x.c !== i.c))} className="absolute top-3 right-3 text-slate-200 hover:text-red-400">✕</button>
                                    <div className="text-xs font-bold text-slate-700 mb-3 pr-6">{i.n}</div>
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center bg-slate-100 rounded-lg px-2 py-1 gap-4 font-black text-xs">
                                            <button onClick={() => setCart(v => v.map(x => x.c === i.c ? {...x, qty: Math.max(1, x.qty-1)} : x))}>-</button>
                                            <span>{i.qty}</span>
                                            <button onClick={() => setCart(v => v.map(x => x.c === i.c ? {...x, qty: x.qty+1} : x))}>+</button>
                                        </div>
                                        <span className="text-xs font-black">{(i.on * i.qty).toLocaleString()}원</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-8 bg-white border-t space-y-5 shadow-2xl">
                            <select value={pro} onChange={e => setPro(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-xs font-black text-blue-600 outline-none">
                                <option value="혜택을 선택하세요">혜택을 선택하세요</option>
                                <optgroup label="쿠폰 혜택">{data.co.map(c => <option key={c.n} value={c.n}>{c.n} 적용</option>)}</optgroup>
                                <optgroup label="기타 프로모션">{["신규 -5,000", "단품 3% 할인", "세트 5% 할인"].map(o => <option key={o} value={o}>{o}</option>)}</optgroup>
                            </select>
                            <div className="text-right border-t border-dashed pt-4">
                                <div className="text-[10px] font-bold text-slate-300">정상가 {res.re.toLocaleString()}원</div>
                                <div className="text-3xl font-black text-blue-600 tracking-tighter mb-4">{res.fi.toLocaleString()}원</div>
                                <div className="flex flex-col gap-1 items-end">
                                    <span className="text-[9px] font-black bg-purple-50 text-purple-500 px-2 py-1 rounded-lg">정상 대비 -{res.offR}%</span>
                                    <span className="text-[9px] font-black bg-emerald-50 text-emerald-500 px-2 py-1 rounded-lg">온라인 대비 -{res.offO}%</span>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <button onClick={() => { if(cart.length>0 && saved.length<3) { const n = [{id:Date.now(), cart:[...cart], pro, tot:res.fi}, ...saved]; setSaved(n); localStorage.setItem('sidiz_memo', JSON.stringify(n)); } }} className="py-4 bg-slate-50 text-slate-300 rounded-xl text-[10px] font-black uppercase">Memo</button>
                                <button onClick={() => window.print()} className="py-4 bg-slate-900 text-white rounded-xl text-xs font-black shadow-xl">PDF 저장</button>
                            </div>
                            <div className="flex gap-1 overflow-x-auto no-scrollbar pt-2">
                                {saved.map((q, i) => (
                                    <button key={q.id} onClick={() => { if(confirm("불러올까요?")) {setCart(q.cart); setPro(q.pro);} }} className="flex-shrink-0 bg-blue-50 text-[9px] px-3 py-2 rounded-lg border border-blue-100 font-bold text-blue-500">#{saved.length-i} ({Math.round(q.tot/10000)}만)</button>
                                ))}
                            </div>
                        </div>
                    </aside>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
