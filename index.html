<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDIZ SE Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { transition: all 0.2s ease; border: 1px solid #f1f5f9; cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 15px 30px rgba(59, 130, 246, 0.08); }
        .sidebar-shadow { box-shadow: -10px 0 30px rgba(0,0,0,0.04); }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 아이콘 컴포넌트 (SVG, 복사 오류 방지를 위해 여러 줄로 나눔) ---
        const IconSearch = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        );

        const IconCart = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
        );

        const IconTrash = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
        );

        const IconInfo = () => (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
        );

        // --- 설정 및 데이터 파싱 로직 (원본 dataService.ts 복제) ---
        const SHEET_ID = "1af5u1NNvYs_ygLw3CnfWiZrp_IkvLcmUs1edO52p1kU";
        const GID = "1647057314";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
        const FIXED_PROMO_OPTIONS = ['신규 회원 할인 (-5,000원)', '단품 3% 할인', '세트 5% 할인'];

        function App() {
            const [storeData, setStoreData] = useState(null);
            const [cart, setCart] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('전체');
            const [selectedSubcategory, setSelectedSubcategory] = useState('전체');
            const [selectedPromo, setSelectedPromo] = useState('혜택을 선택하세요');
            const [loading, setLoading] = useState(true);
            const [promoExpanded, setPromoExpanded] = useState(false);
            const [savedQuotes, setSavedQuotes] = useState(() => JSON.parse(localStorage.getItem('sidiz_se_quotes') || '[]'));

            useEffect(() => {
                fetch(CSV_URL).then(r => r.text()).then(txt => {
                    Papa.parse(txt, { complete: (res) => {
                        const data = res.data;
                        const products = data.slice(29).filter(x => x[2] && x[2] !== "제품명").map(x => ({
                            s: x[0]?.normalize('NFC') || '기타', // Series (Column A)
                            sub: x[1]?.normalize('NFC') || '', // Subcategory (Column B)
                            n: x[2]?.normalize('NFC'), // Name (Column C)
                            c: x[3]?.normalize('NFC'), // Code (Column D)
                            re: parseInt(x[4]?.replace(/,/g, '')) || 0, // Retail (Column E)
                            on: parseInt(x[5]?.replace(/,/g, '')) || 0 // Online (Column F)
                        }));
                        const coupons = data[16] ? data[16].slice(1).filter(v => v).map(v => ({ name: `${parseInt(v)}% 할인`, rate: parseInt(v)/100 })) : [];
                        const events = [];
                        for(let i=1; i<data[8].length; i++) {
                            if(data[8][i] && data[8][i] !== "행사명") events.push({ name: data[8][i].normalize('NFC'), details: data[10]?.[i]?.normalize('NFC'), exceptions: data[11]?.[i]?.normalize('NFC') });
                        }
                        setStoreData({ products, events, coupons, live: data[4]?.[1] || '확인중' });
                        setLoading(false);
                    }});
                });
            }, []);

            // 원본 App.tsx의 필터링 로직 복제
            const seriesList = useMemo(() => {
                if (!storeData) return [];
                const s = new Set<string>();
                storeData.products.forEach(p => s.add(p.s));
                return Array.from(s);
            }, [storeData]);

            const categoryList = useMemo(() => {
                if (!storeData || selectedCategory === '전체') return [];
                const cats = new Set<string>();
                storeData.products.forEach(p => {
                    if (p.s === selectedCategory && p.sub) cats.add(p.sub);
                });
                return Array.from(cats).sort();
            }, [storeData, selectedCategory]);

            const filteredProducts = useMemo(() => {
                if (!storeData) return [];
                const q = searchQuery.toLowerCase().trim().normalize('NFC');
                return storeData.products.filter(p => {
                    const matchSearch = p.n.toLowerCase().normalize('NFC').includes(q) || p.c.toLowerCase().normalize('NFC').includes(q);
                    if (q !== '') return matchSearch;
                    const matchSeries = selectedCategory === '전체' || p.s === selectedCategory;
                    const matchCategory = selectedSubcategory === '전체' || p.sub === selectedSubcategory;
                    return matchSeries && matchCategory;
                });
            }, [storeData, searchQuery, selectedCategory, selectedSubcategory]);

            // 원본 calculator.ts의 계산 로직 복제
            const calc = useMemo(() => {
                const totalOnline = cart.reduce((s, i) => s + (i.on * i.qty), 0);
                const totalRetail = cart.reduce((s, i) => s + (i.re * i.qty), 0);
                let fi = totalOnline;
                const cp = storeData?.coupons.find(c => c.name === selectedPromo);
                if (cp) fi = totalOnline * (1 - cp.rate);
                else if (selectedPromo === '단품 3% 할인') fi = totalOnline * 0.97;
                else if (selectedPromo === '세트 5% 할인') fi = totalOnline * 0.95;
                else if (selectedPromo.includes('5,000')) fi -= 5000;
                return { totalOnline, totalRetail, fi, offRetail: totalRetail > 0 ? ((1 - fi/totalRetail)*100).toFixed(1) : 0, offOnline: totalOnline > 0 ? ((1 - fi/totalOnline)*100).toFixed(1) : 0 };
            }, [cart, selectedPromo, storeData?.coupons]);

            const saveQuote = () => {
                if(cart.length === 0 || savedQuotes.length >= 3) return;
                const newSaved = [{ id: Date.now(), cart: [...cart], promo: selectedPromo, total: calc.fi }, ...savedQuotes];
                setSavedQuotes(newSaved);
                localStorage.setItem('sidiz_se_quotes', JSON.stringify(newSaved));
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-blue-600 text-xl animate-pulse">데이터를 복제 중입니다...</div>;

            return (
                <div className="flex h-screen w-screen bg-white overflow-hidden">
                    {/* [L] 제품 리스트 영역 (비율 75%) */}
                    <div className="flex-1 flex flex-col min-w-0 bg-white border-r">
                        <header className="flex-shrink-0 bg-white border-b">
                            {/* 로고 및 라이브 배지 (원본 크기) */}
                            <div className="px-8 h-16 flex items-center justify-between">
                                <h1 className="text-2xl font-[900] text-slate-800 tracking-tighter italic">SIDIZ <span className="text-blue-600">SE</span></h1>
                                <div className="bg-[#03C75A] text-white px-4 py-1.5 rounded-xl text-xs font-black shadow-sm flex items-center gap-1.5">
                                    <span className="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></span> LIVE: {storeData.live}
                                </div>
                            </div>
                            {/* 프로모션 안내 창 (원본 재현) */}
                            <div className="px-8 py-3 bg-slate-50 border-b">
                                <button onClick={() => setPromoExpanded(!promoExpanded)} className="flex items-center justify-between w-full group">
                                    <div className="flex items-center gap-2">
                                        <div className="text-blue-600"><IconInfo /></div>
                                        <span className="text-[11px] font-bold text-slate-500 uppercase tracking-widest">현재 진행 중인 프로모션 안내 ({storeData.events.length})</span>
                                        <span className="bg-indigo-50 text-indigo-600 text-[10px] px-2 py-0.5 rounded-full font-bold">진행중</span>
                                    </div>
                                    <div className="text-slate-400 group-hover:text-blue-600 transition-colors">{promoExpanded ? "▲" : "▼"}</div>
                                </button>
                                {promoExpanded && (
                                    <div className="grid grid-cols-3 gap-3 mt-4 animate-in fade-in slide-in-from-top-2">
                                        {storeData.events.map((e, i) => (
                                            <div key={i} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm relative group hover:border-blue-100 transition-colors">
                                                <div className="text-[11px] font-black text-blue-600 mb-1">{e.name}</div>
                                                <div className="text-[10px] text-slate-500 leading-tight space-y-1">
                                                    <div>{e.details}</div>
                                                    {e.exceptions && <div className="text-red-400 text-[9px] font-medium pt-1 border-t mt-1 border-red-50">제외: {e.exceptions}</div>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </header>

                        <main className="flex-1 p-8 overflow-y-auto bg-[#fcfdfe] no-scrollbar">
                            {/* 검색창 (원본 크기 및 스타일) */}
                            <div className="relative mb-8 max-w-4xl mx-auto">
                                <div className="absolute left-6 top-5 text-slate-300"><IconSearch /></div>
                                <input type="text" placeholder="제품명 또는 단품코드를 입력하면 전체 검색이 실행됩니다" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full p-5 pl-16 rounded-[2rem] border-none bg-white shadow-xl shadow-slate-200/40 outline-none focus:ring-4 focus:ring-blue-500/10 text-lg font-medium transition-all group-hover:shadow-2xl"/>
                            </div>
                            
                            {/* 필터 칩스 (원본 재현) */}
                            <div className="space-y-3 mb-8">
                                {/* Row 1: Series */}
                                <div className="flex gap-2.5 overflow-x-auto no-scrollbar">
                                    {['전체', ...seriesList].map(s => (
                                        <button key={s} onClick={() => {setSelectedCategory(s); setSelectedSubcategory('전체'); setSearchQuery('');}} className={`px-6 py-2.5 rounded-2xl text-sm font-bold whitespace-nowrap transition-all border ${selectedCategory === s && searchQuery === "" ? 'bg-slate-800 text-white border-transparent shadow-xl' : 'bg-white border-slate-100 text-slate-400 hover:bg-slate-50'}`}>{s}</button>
                                    ))}
                                </div>
                                {/* Row 2: Subcategory (카테고리 필터 복제) */}
                                {categoryList.length > 0 && (
                                    <div className="flex gap-2.5 overflow-x-auto no-scrollbar animate-in slide-in-from-left-4 pt-1">
                                        {['전체', ...categoryList].map(c => (
                                            <button key={c} onClick={() => setSelectedSubcategory(c)} className={`px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition-all border ${selectedSubcategory === c ? 'bg-blue-100 text-blue-700 border-blue-200 shadow-sm' : 'bg-white border-slate-100 text-slate-400 hover:bg-slate-50'}`}>{c}</button>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* 제품 그리드 (원본 재현) */}
                            <div className="grid grid-cols-2 lg:grid-cols-4 2xl:grid-cols-5 gap-6 pb-24">
                                {filteredProducts.map((p, i) => (
                                    <div key={i} onClick={() => setCart(v => {
                                        const e = v.find(x => x.c === p.c);
                                        return e ? v.map(x => x.c === p.c ? {...x, qty: x.qty+1} : x) : [...v, {...p, qty: 1}];
                                    })} className="product-card bg-white p-6 rounded-[2.5rem] flex flex-col h-full relative group">
                                        <div className="text-[10px] font-black text-blue-400 uppercase mb-2.5 tracking-widest">{p.s}</div>
                                        <div className="text-[15px] font-bold text-slate-800 mb-6 h-12 line-clamp-2 leading-snug">{p.n}</div>
                                        <div className="mt-auto border-t pt-5 flex justify-between items-end">
                                            <div>
                                                <div className="text-[11px] text-slate-300 line-through mb-1 font-medium">{p.re.toLocaleString()}원</div>
                                                <div className="text-xl font-[900] text-slate-900 leading-none">{p.on.toLocaleString()}원</div>
                                            </div>
                                            <div className="w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-bold text-xl group-hover:bg-blue-600 group-hover:text-white transition-colors">＋</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>

                    {/* [R] 견적 대시보드 영역 (비율 25%) */}
                    <aside className="w-[400px] sidebar-shadow bg-white flex flex-col h-full z-20">
                        <div className="p-8 border-b flex justify-between items-center h-[100px]">
                            <h2 className="text-xl font-[900] text-slate-800 flex items-center gap-3"><IconCart /> 견적함 <span className="bg-blue-600 text-white px-2.5 py-0.5 rounded-full text-xs font-black">{cart.length}</span></h2>
                            <button onClick={() => setCart([])} className="text-[10px] font-bold text-slate-300 hover:text-red-400 uppercase tracking-widest transition-colors">Clear</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50 no-scrollbar">
                            {cart.map(i => (
                                <div key={i.c} className="bg-white p-5 rounded-[1.5rem] shadow-sm border border-slate-100 relative group animate-in slide-in-from-right-4">
                                    <button onClick={() => setCart(v => v.filter(x => x.c !== i.c))} className="absolute top-4 right-4 text-slate-200 opacity-30 group-hover:opacity-100 hover:text-red-400 transition-opacity"><IconTrash /></button>
                                    <div className="text-xs font-bold text-slate-700 leading-tight mb-4 pr-6">{i.n}</div>
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center bg-slate-100 rounded-xl px-2 py-1 gap-4 font-black text-xs">
                                            <button onClick={() => setCart(v => v.map(x => x.c === i.c ? {...x, qty: Math.max(1, x.qty-1)} : x))} className="w-6 h-6 hover:bg-white rounded-lg transition-colors">-</button>
                                            <span className="w-6 text-center">{i.qty}</span>
                                            <button onClick={() => setCart(v => v.map(x => x.c === i.c ? {...x, qty: x.qty+1} : x))} className="w-6 h-6 hover:bg-white rounded-lg transition-colors">+</button>
                                        </div>
                                        <span className="text-sm font-black text-slate-900">{(i.on * i.qty).toLocaleString()}원</span>
                                    </div>
                                </div>
                            ))}
                            {cart.length === 0 && <div className="h-full flex flex-col items-center justify-center opacity-10 mt-32 font-black tracking-tighter text-4xl">EMPTY</div>}
                        </div>
                        <div className="p-8 bg-white border-t space-y-6 shadow-[0_-20px_50px_rgba(0,0,0,0.05)]">
                            {/* 혜택 선택 (원본 재현) */}
                            <div className="space-y-2.5">
                                <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Overall Benefit</label>
                                <select value={selectedPromo} onChange={e => setSelectedPromo(e.target.value)} className="w-full p-4 bg-slate-50 border-none rounded-2xl text-[13px] font-black text-blue-600 focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                                    <option value="혜택을 선택하세요">혜택을 선택하세요</option>
                                    <optgroup label="금액대별 쿠폰 (시트 연동)">
                                        {storeData.coupons.map(c => <option key={c.name} value={c.name}>{c.name} 적용</option>)}
                                    </optgroup>
                                    <optgroup label="기타 프로모션">
                                        {FIXED_PROMO_OPTIONS.map(p => <option key={p} value={p}>{p}</option>)}
                                    </optgroup>
                                </select>
                            </div>
                            {/* 최종 금액 디스플레이 (글자 크기 및 비율 복제) */}
                            <div className="text-right pt-2 border-t border-dashed border-slate-100">
                                <div className="text-[11px] font-bold text-slate-300 mb-1">정상가 {calc.totalRetail.toLocaleString()}원</div>
                                <div className="text-4xl font-[900] text-blue-600 tracking-tighter mb-5">{calc.fi.toLocaleString()}<span className="text-xl">원</span></div>
                                <div className="flex flex-col gap-2 items-end">
                                    <span className="text-[11px] font-black bg-purple-50 text-purple-500 px-3 py-1.5 rounded-xl border border-purple-100">소비자가 대비 -{calc.offRetail}% 할인</span>
                                    <span className="text-[11px] font-black bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-xl border border-emerald-100">온라인 대비 -{calc.offOnline}% 추가 혜택</span>
                                </div>
                            </div>
                            {/* 버튼 영역 */}
                            <div className="grid grid-cols-2 gap-3">
                                <button onClick={saveQuote} disabled={cart.length===0 || savedQuotes.length>=3} className="py-4 bg-slate-100 text-slate-400 rounded-[1.25rem] text-[10px] font-black hover:bg-slate-200 uppercase tracking-widest transition-all disabled:opacity-30">Memo</button>
                                <button onClick={() => window.print()} className="py-4 bg-slate-900 text-white rounded-[1.25rem] text-xs font-black shadow-2xl active:scale-95 transition-all">견적서 저장</button>
                            </div>
                            {/* 기억하기 슬롯 (원본 재현) */}
                            {savedQuotes.length > 0 && (
                                <div className="flex gap-2 overflow-x-auto no-scrollbar pt-3 border-t border-dashed border-slate-100 animate-in fade-in">
                                    {savedQuotes.map((q, i) => (
                                        <div key={q.id} className="relative group">
                                            <button onClick={() => { if(confirm("불러올까요?")) {setCart(q.cart); setSelectedPromo(q.promo);} }} className="bg-blue-50 text-[10px] px-3 py-2.5 rounded-xl border border-blue-100 font-bold text-blue-500 whitespace-nowrap hover:bg-blue-100 transition-colors">Slot #{savedQuotes.length-i} ({Math.round(q.total/10000)}만)</button>
                                            <button onClick={() => setSavedQuotes(v => { const n = v.filter(x => x.id !== q.id); localStorage.setItem('sidiz_se_quotes', JSON.stringify(n)); return n; })} className="absolute -top-1.5 -right-1.5 bg-white text-red-400 rounded-full w-4 h-4 text-[8px] flex items-center justify-center shadow-md border opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </aside>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
